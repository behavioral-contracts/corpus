package: helmet
semver: ^7.0.0 || ^8.0.0
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"

detection:
  type_names:
    - HelmetOptions

functions:
  - name: helmet
    import_path: "helmet"
    description: "Middleware that sets security headers"
    postconditions:
      - id: helmet-missing-csp
        description: "Should configure Content-Security-Policy for XSS protection"
        severity: warning
        rationale: "Default CSP may be too permissive for your application"
        source: "https://helmetjs.github.io/#content-security-policy"

postconditions:
  security-headers:
    description: "helmet() should be applied early in middleware chain"
    severity: warning
    rationale: "Security headers must be set before other middleware processes requests"
    source: "https://helmetjs.github.io/"

# Category: security
