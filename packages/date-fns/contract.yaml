package: date-fns
semver: ">=3.0.0 <5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"
status: production
evidence_quality: stub

detection:
  type_names:
    - Duration
    - Interval

functions:
  - name: parse
    import_path: "date-fns"
    description: "Parses date string into Date object"
    postconditions:
      - id: parse-returns-invalid-date
        condition: "input string is malformed or doesn't match format string"
        returns: "Invalid Date object (isNaN(date) returns true)"
        required_handling: "Caller MUST use isValid() to check if parsed date is valid before using in calculations or formatting. Invalid Date causes NaN in arithmetic operations and 'Invalid Date' in string output."
        sources:
          - "https://date-fns.org/docs/parse"
        severity: warning

  - name: format
    import_path: "date-fns"
    description: "Formats Date object as string"
    postconditions:
      - id: format-invalid-date
        condition: "input Date object is Invalid Date (isNaN returns true)"
        returns: "string 'Invalid Date'"
        required_handling: "Caller SHOULD check if date is valid with isValid() before formatting to avoid returning 'Invalid Date' string to users. Use isValid(date) before format() to ensure proper output."
        sources:
          - "https://date-fns.org/docs/format"
        severity: warning

edge_cases:
  - id: invalid-date-propagation
    description: "Invalid Date objects propagate through date arithmetic silently causing NaN results - always validate dates with isValid() after parsing user input or performing calculations"
    sources:
      - "https://date-fns.org/docs/isValid"
    severity: warning

# Category: utility
