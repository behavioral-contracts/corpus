package: mongoose
semver: ">=5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"

# Detection rules for analyzer integration
detection:
  # Mongoose doesn't use constructors like "new Mongoose()"
  class_names: []

  # Type declarations (e.g., private client: Model<User>)
  type_names: ["Model", "Document"]

  # Factory methods for creating Models
  factory_methods: ["model"]  # mongoose.model('User', schema)

  # CRITICAL: Require instance tracking to avoid false positives
  # Mongoose method names (.find, .save, .create, .validate) are too generic
  # Pattern-based detection matches non-mongoose code (validators, arrays, etc.)
  # Instance tracking ensures we only flag tracked Model/Document instances
  require_instance_tracking: true

  # Patterns to identify mongoose operations in await expressions
  # These patterns match method calls on Model classes and Document instances
  # NOTE: These patterns are only used as hints; require_instance_tracking=true
  # means violations are ONLY created for tracked instances
  await_patterns:
    # Query operations (Model static methods)
    - ".find"
    - ".findone"
    - ".findbyid"
    - ".exists"
    - ".distinct"

    # Create operations (Model static methods)
    - ".create"
    - ".insertmany"

    # Update operations (Model static methods)
    - ".updateone"
    - ".updatemany"
    - ".findbyidandupdate"
    - ".findoneandupdate"
    - ".replaceone"
    - ".findoneandreplace"

    # Delete operations (Model static methods)
    - ".deleteone"
    - ".deletemany"
    - ".findbyidanddelete"
    - ".findoneanddelete"

    # Aggregation operations
    - ".aggregate"
    - ".countdocuments"
    - ".estimateddocumentcount"
    - ".bulkwrite"

    # Document instance methods
    - ".save"
    - ".validate"

    # Query methods
    - ".exec"
    - ".orfail"

    # Connection methods
    - "mongoose.connect"
    - ".connection.close"

functions:
  # Model.find - Query multiple documents
  - name: find
    import_path: "mongoose"
    description: "Queries the database and returns an array of documents matching the filter"

    postconditions:
      - id: connection-error-no-try-catch
        condition: "Database connection failed or was interrupted"
        throws: "MongooseError or MongoError"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch().
          Handle connection errors separately from query results.
          Implement retry logic for transient connection issues.
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

      - id: cast-error-no-try-catch
        condition: "Query parameter cannot be cast to expected type"
        throws: "CastError"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch().
          Validate query parameters before passing to mongoose.
          Handle CastError separately from other errors.
        source: "https://mongoosejs.com/docs/schematypes.html#what-is-a-schematype"
        severity: error

  # Model.findOne - Query single document
  - name: findOne
    import_path: "mongoose"
    description: "Queries the database and returns a single document matching the filter"

    postconditions:
      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError or MongoError"
        required_handling: "Caller MUST wrap in try-catch or use .catch() to handle connection errors"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

      - id: cast-error-no-try-catch
        condition: "Query parameter casting failed"
        throws: "CastError"
        required_handling: "Caller MUST wrap in try-catch to handle type casting errors"
        source: "https://mongoosejs.com/docs/schematypes.html"
        severity: error

  # Model.findById - Query by ObjectId
  - name: findById
    import_path: "mongoose"
    description: "Finds a single document by its _id field"

    postconditions:
      - id: cast-error-no-try-catch-invalid-id
        condition: "Provided ID is not a valid ObjectId format"
        throws: "CastError with kind: 'ObjectId'"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch().
          Common when user input is passed directly as ID.
          Validate ID format before querying.
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-findById"
        severity: error

      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST handle connection errors"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Model.create - Create new documents
  - name: create
    import_path: "mongoose"
    description: "Creates one or more documents in the database"

    postconditions:
      - id: validation-error-no-try-catch
        condition: "Document validation failed (missing required fields, wrong types, custom validators)"
        throws: "ValidationError with errors object containing field-specific ValidatorErrors"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch().
          Check error.name === 'ValidationError' and inspect error.errors object.
          Each field error is accessible via error.errors[fieldName].
        source: "https://mongoosejs.com/docs/validation.html"
        severity: error

      - id: duplicate-key-error-no-try-catch
        condition: "Unique constraint violation (E11000 error)"
        throws: "MongoError with code: 11000"
        required_handling: >
          Caller MUST wrap in try-catch and check error.code === 11000.
          This is NOT a ValidationError - it comes from MongoDB driver.
          Extract duplicate field from error message or error.keyPattern.
        source: "https://mongoosejs.com/docs/validation.html#unique-indexes"
        severity: error

      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST handle connection errors with retry logic"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Model.insertMany - Bulk create
  - name: insertMany
    import_path: "mongoose"
    description: "Inserts multiple documents into the database in a single operation"

    postconditions:
      - id: validation-error-no-try-catch
        condition: "One or more documents fail validation"
        throws: "ValidationError"
        required_handling: "Caller MUST wrap in try-catch. Default behavior stops on first error; use ordered:false to continue on errors."
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-insertMany"
        severity: error

      - id: duplicate-key-error-no-try-catch
        condition: "Duplicate key constraint violation"
        throws: "MongoError with code: 11000"
        required_handling: "Caller MUST wrap in try-catch and handle duplicate key errors"
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-insertMany"
        severity: error

  # Model.updateOne - Update single document
  - name: updateOne
    import_path: "mongoose"
    description: "Updates a single document matching the filter"

    postconditions:
      - id: validation-error-no-try-catch
        condition: "Update violates validation rules"
        throws: "ValidationError"
        required_handling: "Caller MUST wrap in try-catch to handle validation errors"
        source: "https://mongoosejs.com/docs/validation.html"
        severity: error

      - id: cast-error-no-try-catch
        condition: "Update value cannot be cast to schema type"
        throws: "CastError"
        required_handling: "Caller MUST wrap in try-catch to handle type errors"
        source: "https://mongoosejs.com/docs/schematypes.html"
        severity: error

      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST handle connection errors"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Model.findByIdAndUpdate - Find and update by ID
  - name: findByIdAndUpdate
    import_path: "mongoose"
    description: "Finds a document by ID and updates it, returning the document"

    postconditions:
      - id: prototype-pollution-cve-2023-3696-no-try-catch
        condition: "Malicious update payload exploits prototype pollution vulnerability"
        throws: "May not throw - vulnerability allows arbitrary code execution"
        required_handling: >
          Caller MUST wrap in try-catch.
          CRITICAL: Ensure mongoose version >= 5.13.20, 6.4.6, or 7.3.1 to patch CVE-2023-3696.
          Validate and sanitize all update payloads from user input.
        source: "https://security.snyk.io/vuln/SNYK-JS-MONGOOSE-5777721"
        severity: error

      - id: validation-error-no-try-catch
        condition: "Update violates validation rules"
        throws: "ValidationError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/validation.html"
        severity: error

      - id: cast-error-no-try-catch
        condition: "Invalid ObjectId or type casting failure"
        throws: "CastError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-findByIdAndUpdate"
        severity: error

  # Model.findOneAndUpdate
  - name: findOneAndUpdate
    import_path: "mongoose"
    description: "Finds a document matching filter and updates it"

    postconditions:
      - id: prototype-pollution-cve-2023-3696-no-try-catch
        condition: "Vulnerable to prototype pollution attacks"
        throws: "May not throw - allows RCE"
        required_handling: "Caller MUST wrap in try-catch and validate input. Upgrade mongoose to patched version."
        source: "https://security.snyk.io/vuln/SNYK-JS-MONGOOSE-5777721"
        severity: error

      - id: validation-error-no-try-catch
        condition: "Update violates validation"
        throws: "ValidationError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/validation.html"
        severity: error

  # Model.deleteOne - Delete single document
  - name: deleteOne
    import_path: "mongoose"
    description: "Deletes a single document matching the filter"

    postconditions:
      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Model.findByIdAndDelete
  - name: findByIdAndDelete
    import_path: "mongoose"
    description: "Finds a document by ID and deletes it"

    postconditions:
      - id: cast-error-no-try-catch
        condition: "Invalid ObjectId format"
        throws: "CastError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-findByIdAndDelete"
        severity: error

      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Document.save - Save document instance
  - name: save
    import_path: "mongoose"
    description: "Saves document changes to the database"

    postconditions:
      - id: validation-error-no-try-catch
        condition: "Document validation failed"
        throws: "ValidationError with errors object"
        required_handling: >
          Caller MUST wrap in try-catch.
          Most common error when saving documents.
          Inspect error.errors for field-specific validation failures.
        source: "https://mongoosejs.com/docs/api/document.html#document_Document-save"
        severity: error

      - id: duplicate-key-error-no-try-catch
        condition: "Unique constraint violation"
        throws: "MongoError with code: 11000"
        required_handling: >
          Caller MUST wrap in try-catch and check error.code === 11000.
          Common when saving new documents with existing unique field values.
        source: "https://mongoosejs.com/docs/validation.html#unique-indexes"
        severity: error

      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Query.exec - Execute query
  - name: exec
    import_path: "mongoose"
    description: "Executes the query and returns a promise"

    postconditions:
      - id: query-error-no-try-catch
        condition: "Query execution failed"
        throws: "MongooseError, CastError, or ValidationError depending on failure type"
        required_handling: >
          Caller MUST wrap in try-catch or use .catch().
          .exec() is the terminal operation for query chains.
          All query errors surface here.
        source: "https://mongoosejs.com/docs/api/query.html#query_Query-exec"
        severity: error

  # Query.orFail - Execute with mandatory result
  - name: orFail
    import_path: "mongoose"
    description: "Executes query and throws DocumentNotFoundError if no results"

    postconditions:
      - id: document-not-found-no-try-catch
        condition: "No documents match the query"
        throws: "DocumentNotFoundError"
        required_handling: >
          Caller MUST wrap in try-catch.
          .orFail() is explicitly designed to throw when no results found.
          Use this when document existence is mandatory.
        source: "https://mongoosejs.com/docs/api/query.html#query_Query-orFail"
        severity: error

  # mongoose.connect - Connect to MongoDB
  - name: connect
    import_path: "mongoose"
    description: "Establishes connection to MongoDB database"

    postconditions:
      - id: connection-failed-no-try-catch
        condition: "Cannot connect to MongoDB (network, auth, or invalid connection string)"
        throws: "MongooseError or MongoError"
        required_handling: >
          Caller MUST wrap in try-catch.
          Connection failures should stop application startup.
          Log error details and exit gracefully.
        source: "https://mongoosejs.com/docs/connections.html"
        severity: error

  # Model.aggregate - Run aggregation pipeline
  - name: aggregate
    import_path: "mongoose"
    description: "Executes an aggregation pipeline on the collection"

    postconditions:
      - id: aggregation-error-no-try-catch
        condition: "Invalid pipeline stage or aggregation failure"
        throws: "MongooseError or MongoError"
        required_handling: "Caller MUST wrap in try-catch. Aggregation pipelines can fail with complex stage errors."
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-aggregate"
        severity: error

  # Model.countDocuments
  - name: countDocuments
    import_path: "mongoose"
    description: "Counts documents matching the filter"

    postconditions:
      - id: connection-error-no-try-catch
        condition: "Database connection failed"
        throws: "MongooseError"
        required_handling: "Caller MUST wrap in try-catch"
        source: "https://mongoosejs.com/docs/api/model.html#model_Model-countDocuments"
        severity: error
