        source: "https://github.com/request/request-promise - StatusCodeError for non-2xx responses"
        severity: error

      - id: network-request-errors
        condition: "network failures (ENOTFOUND, ECONNREFUSED, ETIMEDOUT), DNS errors, connection refused"
