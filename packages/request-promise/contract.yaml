# - CVE-2023-28155: SSRF vulnerability in underlying request library (2.88.2 and below)
# - No security updates planned (package unmaintained)
# - Minimum version 4.2.6 required (lodash and memory leak fixes)
#
# MIGRATION RECOMMENDED:
# - got: https://github.com/sindresorhus/got (most feature-rich)
# - axios: https://github.com/axios/axios (most popular)
# - node-fetch: https://github.com/node-fetch/node-fetch (lightweight)
# - undici: https://github.com/nodejs/undici (fastest, official Node.js client)
#
# This contract helps identify missing error handling in legacy codebases
# but strongly encourages migration to actively maintained alternatives.

package: request-promise
semver: ">=4.2.6"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"
status: production

detection:
