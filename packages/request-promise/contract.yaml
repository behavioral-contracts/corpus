package: request-promise
semver: ">=4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-27"
status: draft

functions:
  - name: default
    import_path: "request-promise"
    description: "Makes HTTP request and returns a Promise (DEPRECATED package)"

    postconditions:
      - id: http-error-4xx-5xx
        condition: "response status is 4xx or 5xx and options.simple is true (default)"
        throws: "StatusCodeError with statusCode, error (response body), options, and response properties"
        required_handling: >
          Caller MUST catch StatusCodeError and check err.statusCode to handle HTTP errors.
          Default behavior (simple: true) throws on non-2xx status codes.
        source: "https://github.com/request/request-promise"
        severity: error

      - id: network-failure
        condition: "network error, DNS failure, timeout, or connection refused"
        throws: "RequestError with cause (underlying error), error, options, and response properties"
        required_handling: >
          Caller MUST catch RequestError to handle network failures.
          Check err.cause for underlying error details (ECONNREFUSED, ENOTFOUND, ETIMEDOUT, etc.).
        source: "https://github.com/request/request-promise"
        severity: error

  - name: get
    import_path: "request-promise"
    description: "Makes an HTTP GET request using rp.get() method"

    postconditions:
      - id: http-error-4xx-5xx
        condition: "response status is 4xx or 5xx and options.simple is true (default)"
        throws: "StatusCodeError with statusCode, error, options, and response properties"
        required_handling: >
          Caller MUST catch StatusCodeError when using rp.get().
        source: "https://github.com/request/request-promise"
        severity: error

  - name: post
    import_path: "request-promise"
    description: "Makes an HTTP POST request using rp.post() method"

    postconditions:
      - id: http-error-4xx-5xx
        condition: "response status is 4xx or 5xx and options.simple is true (default)"
        throws: "StatusCodeError with statusCode, error, options, and response properties"
        required_handling: >
          Caller MUST catch StatusCodeError when using rp.post().
        source: "https://github.com/request/request-promise"
        severity: error

edge_cases:
  - id: deprecated-package
    description: "request-promise is DEPRECATED since Feb 11, 2020. Underlying request package no longer maintained."
    source: "https://github.com/request/request-promise"
    severity: warning

  - id: simple-false-disables-statuscodeerror
    description: "Setting options.simple = false disables StatusCodeError. Non-2xx responses resolve normally."
    source: "https://github.com/request/request-promise"
    severity: info
