package: request-promise
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"

detection:
  factory_methods:
    - default
    - get
    - post
    - put
    - delete
    - patch
    - head

functions:
  - name: default
    import_path: "request-promise"
    description: "Makes HTTP request with promise support (wraps request library)"
    postconditions:
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused, HTTP errors"
        throws: "Promise rejection with StatusCodeError or RequestError"
        required_handling: "Use try-catch (async/await) or .catch() (promises)"
        source: "https://www.npmjs.com/package/request-promise"
        severity: error

