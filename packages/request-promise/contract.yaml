edge_cases:
  - id: missing-error-handling
    title: "HTTP request without error handling"
    description: "Making HTTP requests without try-catch (async/await) or .catch() (promise chains) leads to unhandled promise rejections. This is the most common production bug (80-90% frequency) in request-promise codebases."
    vulnerable_pattern: |
      // ❌ Missing try-catch
      async function fetchUser(id) {
        const user = await rp(`https://api.example.com/users/${id}`);
        return user;
      }
    safe_pattern: |
      // ✅ Proper error handling
      async function fetchUser(id) {
        try {
          const user = await rp(`https://api.example.com/users/${id}`);
          return user;
        } catch (error) {
          console.error('Failed to fetch user:', error.message);
          throw error;
        }
      }
    source: "https://github.com/request/request-promise/issues/48 - Common error handling issues"
    severity: error

  - id: unhandled-http-status-codes
    title: "Not handling specific HTTP status codes"
    description: "Assuming all requests succeed without checking for specific HTTP error codes (404, 500, etc.). This leads to poor error messages and application logic errors (50-60% frequency)."
    vulnerable_pattern: |
      // ❌ Doesn't check status codes
      async function getUser(id) {
        const user = await rp(`https://api.example.com/users/${id}`);
        // If 404, StatusCodeError thrown but not handled specifically
        return user.name;
      }
    safe_pattern: |
      // ✅ Checks specific status codes
      async function getUser(id) {
        try {
          const user = await rp(`https://api.example.com/users/${id}`);
          return user.name;
        } catch (error) {
          if (error.statusCode === 404) {
            return null; // User not found
          } else if (error.statusCode === 403) {
            throw new Error('Permission denied');
          }
          throw error;
        }
      }
    source: "https://github.com/request/request-promise/issues/170 - Error object structure"
    severity: warning

  - id: missing-timeout-configuration
    title: "No timeout for long-running requests"
    description: "Requests without timeout configuration can hang indefinitely if the server doesn't respond, causing application hangs and resource exhaustion (40-50% frequency)."
    vulnerable_pattern: |
      // ❌ No timeout
      async function syncData() {
        const data = await rp('https://slow-api.example.com/sync');
        return data;
      }
    safe_pattern: |
      // ✅ Timeout configured
      async function syncData() {
        try {
          const data = await rp({
            uri: 'https://slow-api.example.com/sync',
            timeout: 10000 // 10 seconds
          });
          return data;
        } catch (error) {
          if (error.cause && error.cause.code === 'ETIMEDOUT') {
            console.error('Request timed out');
          }
          throw error;
        }
      }
    source: "General best practice for HTTP clients - always set timeouts"
    severity: warning

  - id: memory-leak-unresolved-promises
    title: "Memory leaks from unresolved promises in loops"
    description: "Creating request-promise instances in loops without proper promise handling causes memory leaks and eventual OOM crashes (5-10% frequency but critical severity)."
    vulnerable_pattern: |
      // ❌ Memory leak - no await or promise collection
      async function fetchAllUsers(userIds) {
        for (const id of userIds) {
          rp(`https://api.example.com/users/${id}`); // No await!
        }
      }
    safe_pattern: |
      // ✅ Proper promise handling
      async function fetchAllUsers(userIds) {
        const promises = userIds.map(id =>
          rp(`https://api.example.com/users/${id}`)
        );
        try {
          return await Promise.all(promises);
        } catch (error) {
          console.error('Batch fetch failed:', error.message);
          throw error;
        }
      }
    source: "https://github.com/request/request-promise/issues/163 - Memory leak via stealthy-require"
    severity: error

  - id: generic-error-handling
    title: "Generic error handling loses context"
    description: "Catching all errors with generic messages without inspecting error.statusCode or error.cause makes debugging difficult (30-40% frequency)."
    vulnerable_pattern: |
      // ❌ Generic error handling
      try {
        await rp('https://api.example.com/data');
      } catch (error) {
        console.error('Something went wrong'); // Too generic
        throw new Error('Request failed'); // Loses original error
      }
    safe_pattern: |
      // ✅ Specific error handling
      try {
        await rp('https://api.example.com/data');
      } catch (error) {
        if (error.statusCode) {
          console.error(`HTTP ${error.statusCode}: ${error.message}`);
        } else if (error.cause && error.cause.code === 'ETIMEDOUT') {
          console.error('Request timeout');
        } else {
          console.error('Network error:', error.message);
        }
        throw error; // Preserve original error
      }
    source: "https://github.com/request/request-promise/issues/170 - Error response handling"
    severity: info
