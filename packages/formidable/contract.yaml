package: "formidable"
semver: ">=3.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-27"
status: production  # Event listener detection now supported by EventListenerAnalyzer
description: "A Node.js module for parsing form data, especially file uploads"

detection:
  class_names:
    - IncomingForm
  require_instance_tracking: true

  # Required event listeners to prevent process crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

functions:
  - name: parse
    import_path: "formidable"
    description: "Parses form data from HTTP request"
    postconditions:
      - id: formidable-001
        condition: "form parsing fails due to invalid data or size limits"
        throws: "Error with parsing details"
        required_handling: "Caller MUST handle parsing errors in event listener or try-catch"
        severity: error
        source: "https://github.com/node-formidable/formidable"
