package: bullmq
semver: ">=5.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-27"
status: production  # Event listener detection now supported by EventListenerAnalyzer
evidence_quality: stub

detection:
  class_names:
    - Queue
    - Worker
    - QueueEvents
  type_names:
    - Queue
    - Worker
    - QueueEvents
  require_instance_tracking: true

  # Required event listeners to prevent production issues
  required_event_listeners:
    - event: "error"
      required: true
      severity: error
    - event: "failed"
      required: true
      severity: error

functions:
  - name: add
    import_path: "bullmq"
    description: "Adds a job to the queue with a payload"
    postconditions:
      - id: queue-add-redis-error
        condition: "Redis connection fails or is down during add operation"
        throws: "Error with Redis connection failure details"
        required_handling: "Caller MUST wrap Queue.add() in try-catch to handle Redis connection errors. Redis downtime crashes application if unhandled. Use try-catch to gracefully degrade or retry."
        sources:
          - "https://docs.bullmq.io/guide/queues"
        severity: error

  - name: addBulk
    import_path: "bullmq"
    description: "Adds multiple jobs to the queue in bulk"
    postconditions:
      - id: queue-addbulk-redis-error
        condition: "Redis connection fails during bulk operation"
        throws: "Error causing partial or complete bulk operation failure"
        required_handling: "Caller MUST wrap Queue.addBulk() in try-catch to handle Redis errors. Bulk operations can partially fail if Redis connection is lost - must handle to prevent data loss."
        sources:
          - "https://docs.bullmq.io/guide/queues"
        severity: error

  - name: process
    import_path: "bullmq"
    description: "Worker method that processes jobs from the queue"
    postconditions:
      - id: worker-process-job-error
        condition: "job processing throws error or promise rejects"
        throws: "Error causing job to fail and trigger retry logic if configured"
        required_handling: "Worker processor SHOULD handle job errors gracefully with try-catch to control retry behavior and provide meaningful error messages. Unhandled errors in processor can cause worker to stop processing subsequent jobs."
        sources:
          - "https://docs.bullmq.io/guide/workers"
        severity: warning

  - name: close
    import_path: "bullmq"
    description: "Closes queue or worker Redis connection"
    postconditions:
      - id: close-error
        condition: "connection close operation fails (timeout, Redis error)"
        throws: "Error during connection cleanup"
        required_handling: "Caller SHOULD handle close() errors during graceful shutdown to ensure proper cleanup. Use try-catch in shutdown handlers to log but not crash on close errors."
        sources:
          - "https://docs.bullmq.io/guide/connections"
        severity: warning

edge_cases:
  - id: redis-connection-handling
    description: "Configure connection event listeners on Queue/Worker to detect Redis disconnections - prevents silent failures and enables graceful degradation during Redis outages"
    sources:
      - "https://docs.bullmq.io/patterns/failing-fast-when-redis-is-down"
    severity: warning
  - id: job-retry-strategy
    description: "Configure retry attempts and backoff strategy in job options - unhandled job errors trigger automatic retries which may mask underlying issues if not properly configured"
    sources:
      - "https://docs.bullmq.io/guide/retrying-failing-jobs"
    severity: info

