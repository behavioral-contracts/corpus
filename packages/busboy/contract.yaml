package: "busboy"
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-27"
status: draft  # Needs Phase 7 (real-world validation) to reach production
description: "A streaming parser for HTML form data for Node.js"

detection:
  class_names:
    - Busboy
  require_instance_tracking: true

  # Required event listeners to prevent process crashes
  required_event_listeners:
    - event: "error"
      required: true
      severity: error

functions:
  - name: Busboy
    import_path: "busboy"
    description: "Creates Busboy parser instance"
    postconditions:
      - id: busboy-001
        condition: "parsing fails due to limits or malformed data"
        throws: "Error emitted via 'error' event"
        required_handling: "Caller MUST attach error event listener to Busboy instance"
        severity: error
        source: "https://github.com/mscdex/busboy"
