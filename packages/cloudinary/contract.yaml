package: cloudinary
semver: ">=1.0.0 <3.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"
status: production

functions:
  - name: upload
    import_path: "cloudinary"
    description: "Upload image or video files to Cloudinary"

    postconditions:
      - id: upload-missing-error-handling
        condition: "network error, validation error, authentication failure, or quota exceeded during upload"
        throws: "Error with network/validation/auth details"
        required_handling: >
          MUST wrap cloudinary.v2.uploader.upload() in try-catch (for async/await)
          OR check error parameter in callback: (error, result) => { if (error) ... }
        source: "https://cloudinary.com/documentation/node_image_and_video_upload"
        severity: error

  - name: upload_large
    import_path: "cloudinary"
    description: "Upload large files (>100MB) in chunks to handle network interruptions"

    postconditions:
      - id: upload-large-missing-error-handling
        condition: "network interruption, 413 error, authentication failure, or chunk upload failure"
        throws: "Error with 413 Request Entity Too Large or network error details"
        required_handling: >
          MUST wrap cloudinary.v2.uploader.upload_large() in try-catch
          OR check error parameter in callback. Files >100MB require this method.
        source: "https://cloudinary.com/documentation/node_image_and_video_upload"
        severity: error

  - name: upload_stream
    import_path: "cloudinary"
    description: "Stream-based upload for processing files on-the-fly"

    postconditions:
      - id: upload-stream-missing-error-handling
        condition: "stream read error, network interruption, memory issue, or authentication failure"
        throws: "Error with stream or network details"
        required_handling: >
          MUST provide callback with error parameter:
          cloudinary.v2.uploader.upload_stream((error, result) => { if (error) ... })
          Stream uploads REQUIRE callback-based error handling.
        source: "https://support.cloudinary.com/hc/en-us/community/posts/360026620212-stream-upload-catching-errors-NODE-JS-"
        severity: error

  - name: destroy
    import_path: "cloudinary"
    description: "Delete an asset from Cloudinary by public_id"

    postconditions:
      - id: destroy-missing-error-handling
        condition: "asset not found, authentication failure, network error, or permission denied"
        throws: "Error with resource not found or authentication details"
        required_handling: >
          MUST wrap cloudinary.v2.uploader.destroy() in try-catch
          OR check error parameter in callback. Asset may not exist.
        source: "https://cloudinary.com/documentation/image_upload_api_reference"
        severity: error
