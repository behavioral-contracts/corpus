package: winston
semver: ">=3.0.0 <4.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"
status: production

detection:
  type_names:
    - Logger
    - LoggerOptions
    - Transport

functions:
  - name: createLogger
    import_path: "winston"
    description: "Creates a logger instance"
    postconditions:
      - id: logger-transport-errors
        condition: "transport fails (file write error, network error, permission denied)"
        returns: "logger instance that silently fails without error listener"
        required_handling: "Caller MUST attach 'error' event listener to logger and transports to handle transport failures. Without listener, errors are silently ignored and logs may be lost."
        source: "https://github.com/winstonjs/winston#handling-uncaught-exceptions-with-winston"
        severity: warning

  - name: log
    import_path: "winston"
    description: "Logs a message"
    postconditions:
      - id: log-transport-failure
        condition: "transport fails during log write (file system full, network down, permissions)"
        returns: "void (operation may fail silently)"
        required_handling: "Caller MUST attach 'error' event listener to logger to detect transport failures. Use logger.on('error', handler) to prevent silent log loss."
        source: "https://github.com/winstonjs/winston#awaiting-logs-to-be-written-in-winston"
        severity: warning

edge_cases:
  - id: uncaught-exception-handling
    description: "handleExceptions option catches uncaught exceptions but may prevent proper error handling if not configured with exitOnError properly"
    source: "https://github.com/winstonjs/winston#to-exit-or-not-to-exit"
    severity: warning

# Category: logging
# Latest version: 3.19.0
# Generated: 2026-02-26
