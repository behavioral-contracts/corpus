package: next
semver: ^16.0.0
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"
status: production
evidence_quality: stub

detection:
  type_names:
    - NextRequest
    - NextResponse

functions:
  - name: GET
    import_path: "next/server"
    description: "API route handler"
    postconditions:
      - id: route-handler-no-error-handling
        condition: "async operation in route handler throws"
        throws: "Unhandled error returns 500 with stack trace exposed"
        description: "API route handlers must handle async errors"
        required_handling: "Wrap async operations in try-catch and return appropriate error responses"
        severity: error
        rationale: "Unhandled errors return 500 with stack traces exposed in response"
        sources:
          - "https://nextjs.org/docs/app/building-your-application/routing/route-handlers"