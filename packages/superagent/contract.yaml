package: superagent
semver: ">=1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"

detection:
  factory_methods:
    - get
    - post
    - put
    - delete
    - patch
    - head

functions:
  - name: get
    import_path: "superagent"
    description: "Makes HTTP GET request"
    postconditions:
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused"
        throws: "Promise rejection or Error in callback"
        required_handling: "Use try-catch (async/await) or .catch() (promises) or error callback"
        source: "https://www.npmjs.com/package/superagent"
        severity: error

