status: production
evidence_quality: stub

functions:
  - name: get
    import_path: "superagent"
    description: "Makes HTTP GET request"
    postconditions:
      - id: network-error-handling
        condition: "network failure, DNS error, timeout, connection refused, HTTP 4xx/5xx errors"
        throws: "Error with status, response, timeout fields (Promise rejection)"
        required_handling: "Use try-catch (async/await) or .catch() (promises) or .end() callback"
        sources:
          - "https://forwardemail.github.io/superagent/"
        severity: error

