        severity: error
        description: >
          users.list() is called without try-catch block. Can throw RequestError, RateLimitedError,
          or HTTPError. Unhandled promise rejections will crash the application.
        detector: >
          If client.users.list() is called in an async context without try-catch wrapping the await,
          or without .catch() in promise chain
        required_handling: >
          MUST wrap await client.users.list() in try-catch block to handle network errors, rate
          limiting, and HTTP errors.
        sources:
          - "https://tessl.io/registry/tessl/npm-slack--web-api/7.10.0/files/docs/error-handling.md"
