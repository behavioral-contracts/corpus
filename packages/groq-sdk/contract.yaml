package: groq-sdk
semver: ">=0.3.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-03-12"
status: production
evidence_quality: stub

functions:
  - name: create
    import_path: "groq-sdk"
    description: >
      Creates a chat completion via the Groq inference API. Supports both standard and
      streaming responses. Used via groq.chat.completions.create(). All network/API
      errors are thrown — the SDK does NOT swallow them.

    postconditions:
      - id: api-error
        condition: >
          Any API or network failure: rate limit (429), auth error (401), bad request (400),
          server error (5xx), network timeout, or connection failure
        throws: >
          Groq.APIError subclass: RateLimitError (429), AuthenticationError (401),
          BadRequestError (400), InternalServerError (5xx), APIConnectionError (network),
          APIConnectionTimeoutError (timeout)
        required_handling: >
          Caller MUST wrap in try-catch. The SDK retries automatically (default maxRetries=2)
          but throws on final failure. Uncaught errors will crash the caller or produce
          unhandled promise rejections in production.

          Minimum handling:
            try {
              const completion = await groq.chat.completions.create({ ... });
            } catch (err) {
              if (err instanceof Groq.RateLimitError) { /* backoff */ }
              else if (err instanceof Groq.APIError) { /* log and surface */ }
              else throw err;
            }

          For streaming (stream: true), the try-catch must wrap the entire for-await loop
          as errors can be thrown mid-stream.
        sources:
          - "https://console.groq.com/docs/errors"
        severity: error

  - name: create
    import_path: "groq-sdk"
    namespace: "audio.transcriptions"
    description: >
      Transcribes audio to text using Whisper models. Requires file upload + model selection.
      Used via groq.audio.transcriptions.create(). Combines I/O (file read) with network call.

    postconditions:
      - id: api-error
        condition: >
          Network failure, invalid file format, unsupported model, or API error
        throws: >
          Groq.APIError or subclass (BadRequestError for invalid format/model,
          InternalServerError for server-side failures, APIConnectionError for network)
        required_handling: >
          Caller MUST wrap in try-catch. File format errors (e.g., wrong extension,
          corrupt audio) and network errors both surface as thrown exceptions.
          Log error with file metadata for debugging.
        sources:
          - "https://console.groq.com/docs/speech-text"
        severity: error

  - name: create
    import_path: "groq-sdk"
    namespace: "audio.translations"
    description: >
      Translates audio to English text using Whisper. Similar to transcriptions but
      forces output language to English. Used via groq.audio.translations.create().

    postconditions:
      - id: api-error
        condition: "Network failure, invalid file, unsupported model, or API error"
        throws: "Groq.APIError or subclass"
        required_handling: >
          Caller MUST wrap in try-catch. Same error surface as transcriptions.
        sources:
          - "https://console.groq.com/docs/speech-text"
        severity: error

  - name: create
    import_path: "groq-sdk"
    namespace: "audio.speech"
    description: >
      Converts text to speech audio using PlayAI models. Returns binary audio data.
      Used via groq.audio.speech.create().

    postconditions:
      - id: api-error
        condition: "Network failure, invalid voice/model, or API error"
        throws: "Groq.APIError or subclass"
        required_handling: >
          Caller MUST wrap in try-catch. TTS failures leave the caller with no audio
          response — this should be surfaced, not swallowed.
        sources:
          - "https://console.groq.com/docs/text-speech"
        severity: error

  - name: create
    import_path: "groq-sdk"
    namespace: "embeddings"
    description: >
      Generates vector embeddings for text inputs. Used via groq.embeddings.create().

    postconditions:
      - id: api-error
        condition: "Network failure, rate limit, or API error"
        throws: "Groq.APIError or subclass (RateLimitError most common under load)"
        required_handling: >
          Caller MUST wrap in try-catch. Embedding failures in batch processing
          pipelines should be caught per-item to avoid aborting the whole batch.
        sources:
          - "https://console.groq.com/docs/openai"
        severity: error

notes:
  - "groq-sdk throws exceptions on API failures (unlike Resend which uses { data, error } pattern)"
  - "SDK auto-retries: maxRetries=2 by default — error thrown only after retries exhausted"
  - "Streaming (stream: true) errors can be thrown mid-iteration in for-await loops"
  - "Groq does NOT charge for 5xx errors — safe to retry with exponential backoff"
  - "RateLimitError includes retry-after header in err.headers for backoff timing"
  - "AuthenticationError (401) should never be retried — configuration error"
  - "groq-sdk API is structurally identical to openai SDK — same deep chain patterns"
