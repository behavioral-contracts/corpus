package: fastify
semver: ^5.0.0
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"

detection:
  type_names:
    - FastifyInstance
    - FastifyRequest
    - FastifyReply

functions:
  - name: get
    import_path: "fastify"
    description: "Registers GET route handler"
    postconditions:
      - id: route-handler-no-error-handling
        description: "Route handlers must handle async errors"
        severity: error
        rationale: "Unhandled async errors crash the server"
        source: "https://fastify.dev/"

postconditions:
  error-handling:
    description: "Must wrap async operations in route handlers"
    severity: error
    rationale: "Unhandled promise rejections crash server"
    source: "https://fastify.dev/"
