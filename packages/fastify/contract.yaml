package: fastify
semver: ">=5.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"
status: production

detection:
  factory_methods:
    - fastify
  type_names:
    - FastifyInstance
    - FastifyRequest
    - FastifyReply

functions:
  - name: get
    import_path: "fastify"
    description: "Registers GET route handler"
    postconditions:
      - id: route-handler-async-error
        condition: "async route handler throws error or promise rejects (database error, validation error)"
        throws: "Error causing 500 Internal Server Error if no error handler is configured"
        required_handling: "Route handlers MUST handle async errors with try-catch or configure setErrorHandler. Unhandled async errors crash server unless error handler is configured. Use try-catch and reply.code(statusCode).send(error) for controlled error responses."
        source: "https://fastify.dev/docs/latest/Reference/Routes/"
        severity: error

edge_cases:
  - id: error-handler-configuration
    description: "Configure setErrorHandler at app or route level for centralized error handling - prevents inconsistent error responses and provides proper error formatting"
    source: "https://fastify.dev/docs/latest/Reference/Server/#seterrorhandler"
    severity: warning

# Category: framework
# Latest version: 5.2.0
# Generated: 2026-02-25
