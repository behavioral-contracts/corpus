package: "@tanstack/react-router"
semver: ">=1.0.0 <2.0.0"
contract_version: "1.0.0"
maintainer: "agent-001"
last_verified: "2026-03-06"
status: production
evidence_quality: stub

functions:
  - name: useNavigate
    import_path: "@tanstack/react-router"
    description: "Hook that returns a navigate function for programmatic navigation"

    postconditions:
      - id: invalid-route-path
        condition: "Navigation target route does not exist"
        throws: "Error indicating route not found"
        required_handling: >
          Caller MUST handle navigation errors with error boundary or try-catch if using
          navigate programmatically. Invalid routes will throw at runtime.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/guide/type-safety"
        severity: error

      - id: navigation-during-unmount
        condition: "Navigation is triggered after component unmounts"
        throws: "Error indicating component is unmounted"
        required_handling: >
          Caller MUST either cleanup navigation side effects or use error boundary to catch
          unmount errors. Common in async navigation (e.g., after API call completes).
        sources:
          - "https://github.com/TanStack/router/issues/1181"
        severity: warning

      - id: invalid-params
        condition: "Navigation params do not match route's param types"
        throws: "Error indicating invalid params for target route"
        required_handling: >
          Caller MUST ensure params match the target route's expected types.
          TypeScript types help but runtime validation still needed.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/guide/type-safety"
        severity: error

    edge_cases:
      - id: strict-mode-validation
        description: "With strict: true, runtime validation throws if route expectations don't match. Use strict: false for shared components."
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: info

  - name: useMatch
    import_path: "@tanstack/react-router"
    description: "Hook that matches the current route and returns match data"

    postconditions:
      - id: route-mismatch-strict
        condition: "Current route doesn't match 'from' parameter when strict: true"
        throws: "Error indicating route mismatch"
        required_handling: >
          Caller MUST either use correct 'from' route, set strict: false for shared components,
          or wrap in error boundary to handle mismatch gracefully.
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: error

      - id: route-not-found
        condition: "Route specified in 'from' parameter does not exist"
        throws: "Error indicating route not found"
        required_handling: >
          Caller MUST ensure route exists before calling useMatch with that route.
          Verify route is registered in router configuration.
        sources:
          - "https://tanstack.com/router/v1/docs/framework/react/guide/not-found-errors"
        severity: error

  - name: useLoaderData
    import_path: "@tanstack/react-router"
    description: "Hook that returns data loaded by the route's loader function"

    postconditions:
      - id: loader-error-unhandled
        condition: "Route loader throws an error during data loading"
        throws: "Error from loader function"
        required_handling: >
          Caller MUST implement ErrorComponent in route definition or parent route to catch
          loader errors. Without error boundary, loader errors crash the app.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/guide/error-boundaries"
        severity: error

      - id: loader-data-unavailable
        condition: "Loader data is accessed before loader completes"
        throws: "Error indicating data not yet loaded"
        required_handling: >
          Caller MUST handle Suspense boundaries properly. useLoaderData throws when data
          is not yet available, triggering Suspense.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouteOptionsType"
        severity: error

      - id: no-loader-defined
        condition: "useLoaderData called on route without loader function"
        throws: "Error indicating no loader defined for route"
        required_handling: >
          Caller MUST ensure route has loader function defined before calling useLoaderData.
          Check route configuration.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouteOptionsType"
        severity: error

  - name: useParams
    import_path: "@tanstack/react-router"
    description: "Hook that returns the current route's parameters"

    postconditions:
      - id: param-type-mismatch
        condition: "Actual param value doesn't match expected type from route definition"
        throws: "Error indicating type mismatch"
        required_handling: >
          Caller MUST validate params match expected types. Runtime validation needed even
          with TypeScript types.
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: error

      - id: required-param-missing
        condition: "Required route param is missing or undefined"
        throws: "Error indicating required param missing"
        required_handling: >
          Caller MUST ensure all required params are provided when navigating to route.
          Check route configuration for required params.
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: error

  - name: useSearch
    import_path: "@tanstack/react-router"
    description: "Hook that returns the current route's search parameters"

    postconditions:
      - id: search-schema-validation-error
        condition: "Search params don't match route's search schema validation"
        throws: "Error with validation details"
        required_handling: >
          Caller MUST handle search param validation errors with error boundary.
          Use validateSearch option in route to define validation schema.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouteOptionsType"
        severity: error

      - id: search-param-parse-error
        condition: "Search param value cannot be parsed to expected type"
        throws: "Error indicating parse failure"
        required_handling: >
          Caller MUST validate search param types. URL strings may not match expected types
          (e.g., number, boolean, array).
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouteOptionsType"
        severity: error

  - name: useRouteContext
    import_path: "@tanstack/react-router"
    description: "Hook that returns the current route's context"

    postconditions:
      - id: context-not-available
        condition: "Route context accessed before route provides context"
        throws: "Error indicating context not available"
        required_handling: >
          Caller MUST ensure route or parent route provides context via beforeLoad or context option.
          Wrap in error boundary or provide fallback.
        sources:
          - "https://tanstack.com/router/v1/docs/framework/react/api/router/RouteOptionsType"
        severity: error

      - id: route-mismatch-strict-context
        condition: "Current route doesn't match 'from' parameter when strict: true"
        throws: "Error indicating route mismatch"
        required_handling: >
          Caller MUST use correct 'from' route or set strict: false for shared components.
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: error

  - name: createRouter
    import_path: "@tanstack/react-router"
    description: "Creates a router instance with route configuration"

    postconditions:
      - id: duplicate-route-paths
        condition: "Multiple routes defined with same path"
        throws: "Error indicating duplicate route path"
        required_handling: >
          Caller MUST ensure all route paths are unique within router configuration.
          Check for conflicting route definitions.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouterOptionsType"
        severity: error

      - id: invalid-route-hierarchy
        condition: "Route hierarchy is invalid (e.g., child route without parent)"
        throws: "Error indicating invalid route tree"
        required_handling: >
          Caller MUST ensure route hierarchy is valid with proper parent-child relationships.
          Wrap createRouter in try-catch during initialization.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouterOptionsType"
        severity: error

      - id: missing-root-route
        condition: "Router configuration missing root route"
        throws: "Error indicating no root route defined"
        required_handling: >
          Caller MUST provide root route using createRootRoute or createRootRouteWithContext.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouterOptionsType"
        severity: error

  - name: Navigate
    import_path: "@tanstack/react-router"
    description: "Component that navigates to a different route when rendered"

    postconditions:
      - id: invalid-route-navigate
        condition: "Navigate component targets non-existent route"
        throws: "Error indicating route not found"
        required_handling: >
          Caller MUST ensure target route exists before rendering Navigate component.
          Wrap in error boundary to prevent crashes.
        sources:
          - "https://tanstack.com/router/v1/docs/framework/react/guide/not-found-errors"
        severity: error

      - id: navigate-infinite-loop
        condition: "Navigate component causes infinite navigation loop"
        throws: "Error indicating max navigation depth exceeded"
        required_handling: >
          Caller MUST avoid navigation loops by checking conditions before rendering Navigate.
          Use replace prop to prevent history stack overflow.
        sources:
          - "https://github.com/TanStack/router/issues/1181"
        severity: error

  - name: Link
    import_path: "@tanstack/react-router"
    description: "Component that creates a link to another route"

    postconditions:
      - id: invalid-route-link
        condition: "Link component targets non-existent route"
        throws: "Error indicating route not found"
        required_handling: >
          Caller MUST ensure target route exists. Invalid links throw at render time.
          Use error boundary to catch link errors.
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: error

      - id: invalid-link-params
        condition: "Link params don't match target route's param types"
        throws: "Error indicating invalid params"
        required_handling: >
          Caller MUST ensure link params match target route's expected types.
          TypeScript helps but runtime validation needed.
        sources:
          - "https://tanstack.com/router/latest/docs/guide/type-safety"
        severity: error

  - name: createRoute
    import_path: "@tanstack/react-router"
    description: "Creates a route definition with type-safe configuration"

    postconditions:
      - id: invalid-loader-function
        condition: "Loader function throws during route initialization"
        throws: "Error from loader function"
        required_handling: >
          Caller MUST ensure loader function is defined correctly and doesn't throw during
          initialization. Wrap route definition in try-catch if loader has initialization logic.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouteOptionsType"
        severity: error

      - id: invalid-search-schema
        condition: "Search validation schema is invalid or malformed"
        throws: "Error indicating invalid schema"
        required_handling: >
          Caller MUST ensure validateSearch function is correctly defined and returns valid schema.
          Test schema validation during development.
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/api/router/RouteOptionsType"
        severity: error

    edge_cases:
      - id: lazy-route-loading-error
        description: "Lazy-loaded routes can fail to load. Implement errorComponent to handle loading failures."
        sources:
          - "https://tanstack.com/router/latest/docs/framework/react/guide/error-boundaries"
        severity: warning
