package: typescript
semver: ">=4.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-24"

functions:
  - name: sys.readFile
    import_path: "typescript"
    namespace: "sys"
    description: "Reads a file from the file system synchronously and returns its contents as a string"

    postconditions:
      - id: file-not-found
        condition: "file does not exist at the specified path"
        throws: "Error with code ENOENT (file not found)"
        required_handling: >
          Caller MUST wrap ts.sys.readFile() in a try-catch block to handle file-not-found errors.
          Uncaught ENOENT errors will crash the application.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: error

      - id: permission-denied
        condition: "insufficient permissions to read the file"
        throws: "Error with code EACCES (permission denied)"
        required_handling: >
          Caller MUST wrap ts.sys.readFile() in a try-catch block to handle permission errors.
          File system permissions can vary across environments.
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: error

      - id: encoding-error
        condition: "file contains invalid encoding or binary data read as text"
        throws: "Error or returns corrupted string data"
        required_handling: >
          Caller SHOULD validate file contents after reading, especially when reading
          user-provided or external files. Binary files read as text will produce invalid results.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning

    edge_cases:
      - id: undefined-return
        description: "May return undefined instead of throwing if file doesn't exist (implementation-dependent)"
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: info

  - name: sys.readDirectory
    import_path: "typescript"
    namespace: "sys"
    description: "Reads a directory and returns an array of file paths matching the specified extensions"

    postconditions:
      - id: directory-not-found
        condition: "directory does not exist at the specified path"
        throws: "Error with code ENOENT (directory not found)"
        required_handling: >
          Caller MUST wrap ts.sys.readDirectory() in a try-catch block to handle
          directory-not-found errors. Uncaught ENOENT errors will crash the application.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: error

      - id: permission-denied
        condition: "insufficient permissions to read the directory"
        throws: "Error with code EACCES (permission denied)"
        required_handling: >
          Caller MUST wrap ts.sys.readDirectory() in a try-catch block to handle
          permission errors. Directory permissions can vary across environments.
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: error

      - id: symlink-loop
        condition: "directory contains circular symbolic links"
        throws: "Error with code ELOOP (too many symbolic links)"
        required_handling: >
          Caller SHOULD wrap ts.sys.readDirectory() in a try-catch to handle symlink loops,
          especially when scanning user-provided or external directories.
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: warning

    edge_cases:
      - id: empty-array-return
        description: "Returns empty array if no files match the specified extensions, not an error"
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: info

  - name: sys.writeFile
    import_path: "typescript"
    namespace: "sys"
    description: "Writes content to a file synchronously"

    postconditions:
      - id: permission-denied
        condition: "insufficient permissions to write to the file or directory"
        throws: "Error with code EACCES (permission denied)"
        required_handling: >
          Caller MUST wrap ts.sys.writeFile() in a try-catch block to handle permission errors.
          Write permissions can be restricted in production environments.
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: error

      - id: directory-not-found
        condition: "parent directory does not exist"
        throws: "Error with code ENOENT (directory not found)"
        required_handling: >
          Caller MUST either:
          1. Wrap ts.sys.writeFile() in a try-catch and handle ENOENT, OR
          2. Create parent directories before writing (e.g., using ts.sys.createDirectory or mkdirp)
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: error

      - id: disk-full
        condition: "insufficient disk space"
        throws: "Error with code ENOSPC (no space left on device)"
        required_handling: >
          Caller SHOULD wrap ts.sys.writeFile() in a try-catch to handle disk-full errors,
          especially for build tools that may write large files.
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: warning

      - id: read-only-filesystem
        condition: "filesystem is mounted read-only"
        throws: "Error with code EROFS (read-only file system)"
        required_handling: >
          Caller SHOULD wrap ts.sys.writeFile() in a try-catch to handle read-only filesystem errors.
        source: "https://nodejs.org/docs/latest/api/errors.html"
        severity: warning

  - name: createProgram
    import_path: "typescript"
    description: "Creates a TypeScript program from source files and compiler options"

    postconditions:
      - id: file-not-found
        condition: "source file specified in rootNames does not exist"
        throws: "May throw Error or return program with diagnostics"
        required_handling: >
          Caller SHOULD wrap ts.createProgram() in a try-catch AND check
          ts.getPreEmitDiagnostics() for file-not-found errors. The API may
          return a program with errors rather than throwing.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning

      - id: invalid-compiler-options
        condition: "compiler options are invalid or incompatible"
        throws: "May throw Error or return program with diagnostics"
        required_handling: >
          Caller SHOULD validate compiler options before passing to ts.createProgram()
          or check diagnostics after program creation.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning

      - id: unchecked-diagnostics
        condition: "program created successfully but contains compilation errors"
        returns: "Program object with errors accessible via getPreEmitDiagnostics()"
        required_handling: >
          Caller MUST call ts.getPreEmitDiagnostics(program) after creating a program
          to check for compilation errors. Programs can be created even when source
          files have errors, but emitting without checking diagnostics is unsafe.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning

    edge_cases:
      - id: module-resolution-failure
        description: "If module resolution fails, errors appear in diagnostics rather than throwing"
        source: "https://www.typescriptlang.org/docs/handbook/module-resolution.html"
        severity: info

  - name: createCompilerHost
    import_path: "typescript"
    description: "Creates a compiler host that provides file system and environment operations"

    postconditions:
      - id: custom-host-file-errors
        condition: "custom getSourceFile implementation encounters file system errors"
        throws: "Depends on custom implementation - may throw or return undefined"
        required_handling: >
          When implementing custom CompilerHost, the getSourceFile method MUST handle
          file system errors (ENOENT, EACCES) gracefully. Either wrap fs operations
          in try-catch and return undefined, or allow errors to propagate with clear messages.
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: warning

    edge_cases:
      - id: default-host-delegates-to-sys
        description: "Default compiler host delegates to ts.sys, which can throw file system errors"
        source: "https://github.com/microsoft/TypeScript-wiki/blob/main/Using-the-Compiler-API.md"
        severity: info
