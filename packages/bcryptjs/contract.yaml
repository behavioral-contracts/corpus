package: bcryptjs
semver: ">=2.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"

functions:
  - name: compare
    import_path: "bcryptjs"
    description: "Compares a plaintext password with a hash"

    postconditions:
      - id: comparison-error
        condition: "comparison fails internally"
        throws: "Error"
        required_handling: "Caller MUST wrap in try-catch when used with await"
        source: "https://www.npmjs.com/package/bcryptjs"
        severity: error

  - name: hash
    import_path: "bcryptjs"
    description: "Hashes a password with optional salt rounds"

    postconditions:
      - id: hashing-error
        condition: "hashing fails (e.g., invalid salt rounds)"
        throws: "Error"
        required_handling: "Caller MUST wrap in try-catch when used with await"
        source: "https://www.npmjs.com/package/bcryptjs"
        severity: error
