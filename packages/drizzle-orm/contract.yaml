package: drizzle-orm
semver: ">=0.45.0 <1.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-25"
status: production
evidence_quality: stub

detection:
  type_names:
    - DrizzleDB
    - PgDatabase

functions:
  - name: select
    import_path: "drizzle-orm"
    description: "Executes a SELECT query"
    postconditions:
      - id: select-query-error
        condition: "query fails (connection lost, timeout, invalid column, SQL syntax error)"
        throws: "Error with database-specific error details"
        required_handling: "Caller MUST wrap select queries in try-catch to handle database errors. Connection failures and SQL errors crash application if unhandled."
        sources:
          - "https://orm.drizzle.team/docs/select"
        severity: error

  - name: insert
    import_path: "drizzle-orm"
    description: "Executes an INSERT query"
    postconditions:
      - id: insert-constraint-violation
        condition: "insert violates constraint (unique, foreign key, not null, check constraint)"
        throws: "Error with constraint violation details and database error code"
        required_handling: "Caller MUST wrap insert operations in try-catch to handle constraint violations. Unique violations, foreign key errors, and validation failures crash application if unhandled."
        sources:
          - "https://orm.drizzle.team/docs/insert"
        severity: error

  - name: update
    import_path: "drizzle-orm"
    description: "Executes an UPDATE query"
    postconditions:
      - id: update-constraint-violation
        condition: "update violates constraint or fails (unique, foreign key, connection lost)"
        throws: "Error with constraint violation or connection error details"
        required_handling: "Caller MUST wrap update operations in try-catch to handle constraint violations and connection errors. Database errors crash application if unhandled."
        sources:
          - "https://orm.drizzle.team/docs/update"
        severity: error

  - name: delete
    import_path: "drizzle-orm"
    description: "Executes a DELETE query"
    postconditions:
      - id: delete-constraint-violation
        condition: "delete violates foreign key constraint (referenced by other tables)"
        throws: "Error with foreign key constraint violation details"
        required_handling: "Caller MUST wrap delete operations in try-catch to handle foreign key constraint violations. Cascade deletes and constraint errors crash application if unhandled."
        sources:
          - "https://orm.drizzle.team/docs/delete"
        severity: error

edge_cases:
  - id: transaction-handling
    description: "Use db.transaction() to wrap multiple operations - must handle transaction errors to ensure rollback and prevent partial commits"
    sources:
      - "https://orm.drizzle.team/docs/transactions"
    severity: warning

# Category: database
