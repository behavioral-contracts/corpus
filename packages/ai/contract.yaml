package: ai
semver: ">=2.0.0 <7.0.0"
contract_version: "2.0.0"
maintainer: "agent-001"
last_verified: "2026-03-06"
status: production

functions:
  - name: generateText
    import_path: "ai"
    description: "Generates text using an LLM model. Waits for complete response before returning."

    postconditions:
      - id: api-error-rate-limit
        condition: "API provider returns 429 (rate limit exceeded)"
        throws: "Error with API error details"
        required_handling: >
          Caller MUST wrap in try-catch and implement retry logic with exponential backoff.
          Check error response for Retry-After header. Consider using maxRetries parameter.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-text"
        severity: error

      - id: api-error-auth
        condition: "API provider returns 401/403 (authentication/authorization failure)"
        throws: "Error with authentication error details"
        required_handling: >
          Caller MUST wrap in try-catch and verify API key configuration.
          Do not retry authentication errors automatically.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-text"
        severity: error

      - id: api-error-network
        condition: "Network error or connection timeout occurs"
        throws: "Error with network error details"
        required_handling: >
          Caller MUST wrap in try-catch to handle network failures gracefully.
          Consider using maxRetries parameter for transient network errors.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-text"
        severity: error

      - id: api-error-invalid-request
        condition: "API provider returns 400 (invalid request parameters)"
        throws: "Error with validation error details"
        required_handling: >
          Caller MUST wrap in try-catch and validate input parameters before calling.
          Check error message for specific validation failures.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-text"
        severity: error

      - id: model-error-content-filter
        condition: "Model response triggers content filtering/safety checks"
        throws: "Error indicating content was filtered"
        required_handling: >
          Caller MUST wrap in try-catch and handle content filtering errors appropriately.
          Consider implementing content pre-screening or alternative prompts.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-text"
        severity: error

  - name: streamText
    import_path: "ai"
    description: "Streams text generation from an LLM model. Returns immediately and streams chunks."

    postconditions:
      - id: stream-error-no-handler
        condition: "Error occurs during streaming but no onError handler is provided"
        throws: "Error is included in stream without being caught, may crash server"
        required_handling: >
          Caller MUST provide an onError callback to handle stream errors gracefully.
          Without onError, errors can crash the application. Errors do NOT throw in streamText.
        source: "https://ai-sdk.dev/docs/reference/ai-sdk-core/stream-text"
        severity: error

      - id: stream-error-rate-limit
        condition: "API provider returns 429 during streaming"
        throws: "Error passed to onError callback"
        required_handling: >
          Caller MUST provide onError callback to handle rate limit errors.
          Return appropriate error message to include in stream.
        source: "https://ai-sdk.dev/docs/reference/ai-sdk-core/stream-text"
        severity: error

      - id: stream-error-network
        condition: "Network error occurs during streaming"
        throws: "Error passed to onError callback"
        required_handling: >
          Caller MUST provide onError callback to handle network failures during streaming.
          Return appropriate error message to include in stream.
        source: "https://ai-sdk.dev/docs/reference/ai-sdk-core/stream-text"
        severity: error

    edge_cases:
      - id: stream-errors-not-thrown
        description: "Unlike generateText, streamText does NOT throw errors. All errors go to onError callback to prevent server crashes."
        source: "https://ai-sdk.dev/docs/reference/ai-sdk-core/stream-text"
        severity: warning

  - name: generateObject
    import_path: "ai"
    description: "Generates structured data using an LLM model with Zod schema validation."

    postconditions:
      - id: schema-validation-error
        condition: "Generated output does not match provided Zod schema"
        throws: "Error with schema validation details"
        required_handling: >
          Caller MUST wrap in try-catch to handle schema validation failures.
          Model may generate invalid JSON or data that doesn't conform to schema.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

      - id: api-error-rate-limit
        condition: "API provider returns 429 (rate limit exceeded)"
        throws: "Error with API error details"
        required_handling: >
          Caller MUST wrap in try-catch and implement retry logic with exponential backoff.
          Consider using maxRetries parameter.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

      - id: api-error-auth
        condition: "API provider returns 401/403 (authentication failure)"
        throws: "Error with authentication error details"
        required_handling: >
          Caller MUST wrap in try-catch and verify API key configuration.
          Do not retry authentication errors automatically.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

      - id: api-error-network
        condition: "Network error or connection timeout occurs"
        throws: "Error with network error details"
        required_handling: >
          Caller MUST wrap in try-catch to handle network failures gracefully.
          Consider using maxRetries for transient errors.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

      - id: json-parsing-error
        condition: "Model generates invalid JSON that cannot be parsed"
        throws: "Error with JSON parsing details"
        required_handling: >
          Caller MUST wrap in try-catch to handle JSON parsing failures.
          Model may generate malformed JSON despite JSON mode being enabled.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

  - name: streamObject
    import_path: "ai"
    description: "Streams structured data generation with Zod schema validation."

    postconditions:
      - id: stream-error-no-handler
        condition: "Error occurs during streaming but no onError handler is provided"
        throws: "Error is included in stream without being caught"
        required_handling: >
          Caller MUST provide an onError callback to handle stream errors gracefully.
          Schema validation and API errors will be passed to onError.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

      - id: stream-schema-validation-error
        condition: "Streamed output does not match provided Zod schema"
        throws: "Error passed to onError callback"
        required_handling: >
          Caller MUST provide onError callback to handle schema validation failures.
          Partial streamed objects may fail validation.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

      - id: stream-error-rate-limit
        condition: "API provider returns 429 during streaming"
        throws: "Error passed to onError callback"
        required_handling: >
          Caller MUST provide onError callback to handle rate limit errors.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: error

    edge_cases:
      - id: partial-object-validation
        description: "Partial objects during streaming may fail schema validation even if final object is valid."
        source: "https://ai-sdk.dev/docs/ai-sdk-core/generating-structured-data"
        severity: info

  - name: embed
    import_path: "ai"
    description: "Generates embeddings for a single input text using an embedding model."

    postconditions:
      - id: api-error-rate-limit
        condition: "API provider returns 429 (rate limit exceeded)"
        throws: "Error with API error details"
        required_handling: >
          Caller MUST wrap in try-catch and implement retry logic with exponential backoff.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: api-error-auth
        condition: "API provider returns 401/403 (authentication failure)"
        throws: "Error with authentication error details"
        required_handling: >
          Caller MUST wrap in try-catch and verify API key configuration.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: api-error-network
        condition: "Network error or connection timeout occurs"
        throws: "Error with network error details"
        required_handling: >
          Caller MUST wrap in try-catch to handle network failures gracefully.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: input-too-long
        condition: "Input text exceeds model's maximum token limit"
        throws: "Error indicating input is too long"
        required_handling: >
          Caller MUST wrap in try-catch and validate input length before calling.
          Chunk large inputs or use appropriate model with longer context.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

  - name: embedMany
    import_path: "ai"
    description: "Generates embeddings for multiple input texts in batch using an embedding model."

    postconditions:
      - id: api-error-rate-limit
        condition: "API provider returns 429 (rate limit exceeded)"
        throws: "Error with API error details"
        required_handling: >
          Caller MUST wrap in try-catch and implement retry logic with exponential backoff.
          Consider processing batch in smaller chunks to avoid rate limits.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: api-error-auth
        condition: "API provider returns 401/403 (authentication failure)"
        throws: "Error with authentication error details"
        required_handling: >
          Caller MUST wrap in try-catch and verify API key configuration.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: api-error-network
        condition: "Network error or connection timeout occurs"
        throws: "Error with network error details"
        required_handling: >
          Caller MUST wrap in try-catch to handle network failures gracefully.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: batch-size-exceeded
        condition: "Batch size exceeds API provider's maximum"
        throws: "Error indicating batch is too large"
        required_handling: >
          Caller MUST wrap in try-catch and split large batches into smaller chunks.
          Check API provider's batch size limits.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

      - id: partial-batch-failure
        condition: "Some embeddings in batch fail but others succeed"
        throws: "Error with details about which inputs failed"
        required_handling: >
          Caller MUST wrap in try-catch and handle partial batch failures.
          May need to retry failed items individually.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: error

    edge_cases:
      - id: batch-performance
        description: "Large batches may be slower than expected due to provider rate limiting. Consider chunking."
        source: "https://ai-sdk.dev/docs/ai-sdk-core/embeddings"
        severity: info

  - name: tool
    import_path: "ai"
    description: "Defines a tool/function that can be called by the LLM during generation."

    postconditions:
      - id: tool-execution-error
        condition: "Tool function throws an error during execution"
        throws: "Error from tool function execution"
        required_handling: >
          Caller MUST wrap tool.execute in try-catch to handle execution errors.
          Tool errors should be reported back to the model appropriately.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/tools-and-tool-calling"
        severity: error

      - id: tool-schema-validation-error
        condition: "Tool arguments do not match provided Zod schema"
        throws: "Error with schema validation details"
        required_handling: >
          Caller MUST validate tool parameters with Zod schema.
          Model may provide invalid arguments despite schema being specified.
        source: "https://ai-sdk.dev/docs/ai-sdk-core/tools-and-tool-calling"
        severity: error

    edge_cases:
      - id: tool-max-iterations
        description: "Multiple tool calls can lead to infinite loops. Set maxSteps/maxToolRoundtrips to limit iterations."
        source: "https://ai-sdk.dev/docs/ai-sdk-core/tools-and-tool-calling"
        severity: warning
