package: bcrypt
semver: ">=5.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-03-12"
status: production
evidence_quality: confirmed

functions:
  - name: hash
    import_path: "bcrypt"
    description: "Hashes a password or data string using bcrypt. Returns a Promise if no callback is provided."

    preconditions:
      - id: data-not-null
        description: "The data argument must not be null or undefined"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error
      - id: salt-not-null
        description: "The salt argument (string or number of rounds) must not be null or undefined"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error

    postconditions:
      - id: invalid-args
        condition: "data or salt is null/undefined, or data is not a string/Buffer, or salt is not a string or number"
        throws: "Error with message 'data and salt arguments required' or 'data must be a string or Buffer and salt must either be a salt string or a number of rounds'"
        required_handling: >
          Caller MUST validate inputs before calling bcrypt.hash().
          Wrap calls in try-catch (synchronous throw path) or use .catch() / try-await-catch for
          the Promise path. Unhandled rejections will crash the process in Node.js.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error

      - id: hashing-error
        condition: "An error occurs during the native bcrypt hashing operation (e.g., native module failure)"
        throws: "Error — rejected Promise or callback first argument"
        required_handling: >
          Caller MUST wrap bcrypt.hash() in try-catch when using async/await,
          or provide an error-checking callback. Unhandled rejections will crash the process.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: error

      - id: success
        condition: "Hashing completes successfully"
        returns: "Promise<string> resolving to the bcrypt hash string (60 characters)"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: info

    edge_cases:
      - id: truncation-at-72-bytes
        description: "bcrypt only uses the first 72 bytes of input. Passwords longer than 72 bytes are silently truncated — two different passwords that share the same first 72 bytes will hash to the same value."
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: warning

      - id: high-rounds-cost
        description: "Using saltRounds above 12 significantly increases hashing time (each increment doubles cost). Values above 14 can cause HTTP request timeouts in web servers."
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: warning

  - name: compare
    import_path: "bcrypt"
    description: "Compares a plain-text data value against a bcrypt hash. Returns a Promise if no callback is provided."

    preconditions:
      - id: data-not-null
        description: "The data argument must not be null or undefined"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error
      - id: hash-not-null
        description: "The hash argument must not be null or undefined"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error

    postconditions:
      - id: invalid-args
        condition: "data or hash is null/undefined, or data is not a string/Buffer, or hash is not a string"
        throws: "Error with message 'data and hash arguments required' or 'data must be a string or Buffer and hash must be a string'"
        required_handling: >
          Caller MUST validate that both arguments are present and of the correct type.
          Wrap calls in try-catch or use .catch() on the returned Promise.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error

      - id: comparison-error
        condition: "An error occurs during the native bcrypt comparison (e.g., malformed hash string)"
        throws: "Error — rejected Promise or callback first argument"
        required_handling: >
          Caller MUST wrap bcrypt.compare() in try-catch when using async/await.
          A malformed hash string causes an error, not a false return value.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: error

      - id: mismatch
        condition: "The plain-text data does not match the hash"
        returns: "Promise<false> — resolves to boolean false"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: info

      - id: match
        condition: "The plain-text data matches the hash"
        returns: "Promise<true> — resolves to boolean true"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: info

    edge_cases:
      - id: timing-safe
        description: "bcrypt.compare() is timing-safe by design. Never use string equality (===) to compare hashes — that is not timing-safe."
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: warning

  - name: genSalt
    import_path: "bcrypt"
    description: "Generates a bcrypt salt with the specified number of rounds. Returns a Promise if no callback is provided. Defaults to 10 rounds."

    postconditions:
      - id: invalid-rounds
        condition: "rounds parameter is provided but is not a number"
        throws: "Error with message 'rounds must be a number'"
        required_handling: >
          Caller MUST ensure rounds is a number when provided.
          Wrap in try-catch or use .catch() on the returned Promise.
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error

      - id: invalid-minor
        condition: "minor version parameter is provided but is not 'a' or 'b'"
        throws: "Error with message 'minor must be either a or b'"
        required_handling: "Only pass 'a' or 'b' as the minor version. The default ('b') is recommended for new code."
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/bcrypt.js"
        severity: error

      - id: success
        condition: "Salt generation succeeds"
        returns: "Promise<string> resolving to the generated salt string"
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: info

    edge_cases:
      - id: default-rounds
        description: "Default saltRounds is 10. NIST recommends at least 10 rounds. The bcrypt spec maximum is 31. Most apps should use 10-12."
        sources:
          - "https://github.com/kelektiv/node.bcrypt.js/blob/master/README.md"
        severity: info
