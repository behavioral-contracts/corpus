package: "bcrypt"
status: in-development
description: "A library to help you hash passwords"
semver: ">=5.0.0"

postconditions:
  - id: bcrypt-001
    summary: "Bcrypt operations must handle hashing errors"
    severity: ERROR
    behavior: |
      All bcrypt hashing and comparison operations must be wrapped in try-catch
      blocks to handle errors.
    patterns:
      - "bcrypt.hash()"
      - "bcrypt.compare()"
      - "bcrypt.genSalt()"
