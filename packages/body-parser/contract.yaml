package: body-parser
semver: ">=1.20.0 <3.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-27"
status: production
evidence_quality: confirmed

functions:
  - name: json
    import_path: "body-parser"
    description: >
      Returns an Express middleware that parses incoming requests with JSON
      bodies. Populates req.body with the parsed object when the Content-Type
      header matches 'application/json'.

    postconditions:
      - id: malformed-json-throws
        condition: "request body is not valid JSON"
        throws: "SyntaxError with err.status === 400 and err.type === 'entity.parse.failed'"
        required_handling: >
          An Express error-handling middleware with the signature (err, req, res, next)
          MUST be registered after all routes. Without it, malformed JSON payloads
          crash the entire application (DoS). The handler should check
          err instanceof SyntaxError && err.status === 400 && 'body' in err
          and return a 400 response.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
          - "https://github.com/expressjs/body-parser/issues/122"
        severity: error

      - id: payload-too-large
        condition: "request body exceeds the configured size limit (default 100kb)"
        throws: "Error with err.type === 'entity.too.large' and err.status === 413"
        required_handling: >
          Error-handling middleware MUST catch this error and return 413.
          The size limit SHOULD be configured explicitly based on application
          requirements. Values above 5MB increase memory pressure and DoS risk.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
          - "https://vulert.com/vuln-db/debian-11-node-body-parser-170959"
        severity: error

      - id: unsupported-charset
        condition: "request charset is not supported"
        throws: "Error with err.type === 'charset.unsupported' and err.status === 415"
        required_handling: >
          Error-handling middleware MUST catch this and return 415 Unsupported
          Media Type to the client.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: error

      - id: content-type-mismatch
        condition: "request Content-Type does not match the configured 'type' option"
        returns: "Middleware calls next() without populating req.body"
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: info

    edge_cases:
      - id: req-body-untrusted
        description: >
          req.body is derived from user-controlled input and MUST be validated
          before use. Properties may be missing, the wrong type, or adversarially
          crafted. Accessing req.body.foo.toString() without type checks will
          throw at runtime. Use a schema validation library (zod, joi) or explicit
          type guards.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: warning

      - id: route-specific-preferred
        description: >
          The official Express documentation recommends attaching body-parser as
          route-specific middleware (app.post('/route', jsonParser, handler))
          rather than globally (app.use(jsonParser)). Route-specific use reduces
          the attack surface by only parsing bodies on routes that need it.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: info

  - name: urlencoded
    import_path: "body-parser"
    description: >
      Returns an Express middleware that parses incoming requests with
      URL-encoded bodies. Populates req.body when Content-Type is
      'application/x-www-form-urlencoded'.

    postconditions:
      - id: payload-too-large
        condition: "request body exceeds the configured size limit"
        throws: "Error with err.type === 'entity.too.large' and err.status === 413"
        required_handling: >
          Error-handling middleware MUST catch this and return 413.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: error

      - id: too-many-parameters
        condition: "number of URL-encoded parameters exceeds parameterLimit (default 1000)"
        throws: "Error with err.type === 'parameters.too.many' and err.status === 413"
        required_handling: >
          Error-handling middleware MUST catch this and return 413. The parameterLimit
          option SHOULD be reduced from the default of 1000 to the minimum required by
          the application to mitigate CVE-2025-13466 (DoS via parameter flooding).
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
          - "https://github.com/expressjs/body-parser/security/advisories/GHSA-wqch-xfxh-vrr4"
        severity: error

      - id: parse-failure
        condition: "body cannot be parsed as URL-encoded data"
        throws: "Error with err.type === 'entity.parse.failed' and err.status === 400"
        required_handling: >
          Error-handling middleware MUST catch this and return 400.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: error

    edge_cases:
      - id: extended-depth-limit
        description: >
          When extended is true, the qs library is used to parse nested objects.
          The default depth limit is 32, which allows deeply nested structures
          that can cause elevated memory usage or stack overflows. The official
          docs recommend keeping this value as low as possible for the application.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: warning

      - id: dos-cve-2025-13466
        description: >
          CVE-2025-13466 (CVSS 7.5): body-parser 2.2.0 is vulnerable to DoS via
          URL-encoded payloads with a very large number of parameters within the
          default 100KB size limit. Mitigate by setting parameterLimit to the
          minimum needed (e.g., 100 instead of the default 1000).
        sources:
          - "https://secalerts.co/vulnerability/CVE-2025-13466"
          - "https://github.com/expressjs/body-parser/security/advisories/GHSA-wqch-xfxh-vrr4"
        severity: warning

      - id: req-body-untrusted
        description: >
          req.body is user-controlled and MUST be validated before use.
          All properties and values are untrusted.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: warning

  - name: raw
    import_path: "body-parser"
    description: >
      Returns an Express middleware that parses incoming requests with raw binary
      bodies as a Buffer. Populates req.body when Content-Type matches
      'application/octet-stream'.

    postconditions:
      - id: payload-too-large
        condition: "request body exceeds the configured size limit"
        throws: "Error with err.type === 'entity.too.large' and err.status === 413"
        required_handling: >
          Error-handling middleware MUST catch this and return 413.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: error

      - id: content-type-mismatch
        condition: "request Content-Type does not match the configured 'type' option"
        returns: "Middleware calls next() without populating req.body"
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: info

  - name: text
    import_path: "body-parser"
    description: >
      Returns an Express middleware that parses incoming requests with text bodies
      as a string. Populates req.body when Content-Type matches 'text/plain'.

    postconditions:
      - id: payload-too-large
        condition: "request body exceeds the configured size limit"
        throws: "Error with err.type === 'entity.too.large' and err.status === 413"
        required_handling: >
          Error-handling middleware MUST catch this and return 413.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: error

      - id: unsupported-charset
        condition: "request charset is not supported"
        throws: "Error with err.type === 'charset.unsupported' and err.status === 415"
        required_handling: >
          Error-handling middleware MUST catch this and return 415.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: error

      - id: content-type-mismatch
        condition: "request Content-Type does not match the configured 'type' option"
        returns: "Middleware calls next() without populating req.body"
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: info

    edge_cases:
      - id: multipart-not-supported
        description: >
          body-parser does NOT handle multipart/form-data (file uploads). Attempting
          to use it for file uploads will silently skip parsing. Use multer, busboy,
          or formidable for multipart bodies.
        sources:
          - "https://expressjs.com/en/resources/middleware/body-parser.html"
        severity: info
