package: "nock"
status: in-development
description: "HTTP server mocking and expectations library for Node.js testing. Intercepts HTTP requests and allows defining expected requests/responses without making real network calls."
semver: ">=9.0.0"
last_verified: "2026-02-27"

# Behavioral contract for nock - throw-based error model for test failures
# Focus: Unmatched requests, scope leaks, missing cleanup, configuration errors

functions:
  - name: nock
    detection:
      patterns:
        - call_expression: nock
    postconditions:
      - throws

  - name: scope.get
    detection:
      patterns:
        - member_expression: get
          on_object_from: nock
    postconditions:
      - throws

  - name: scope.post
    detection:
      patterns:
        - member_expression: post
          on_object_from: nock
    postconditions:
      - throws

  - name: scope.put
    detection:
      patterns:
        - member_expression: put
          on_object_from: nock
    postconditions:
      - throws

  - name: scope.delete
    detection:
      patterns:
        - member_expression: delete
          on_object_from: nock
    postconditions:
      - throws

  - name: scope.isDone
    detection:
      patterns:
        - member_expression: isDone
          on_object_from: nock
    postconditions:
      - returns_boolean

postconditions:
  # Priority 1: Unmatched Requests (NetConnectNotAllowedError)
  - id: nock-unmatched-request
    summary: "Unmatched HTTP requests throw NetConnectNotAllowedError when disableNetConnect is enabled"
    severity: ERROR
    behavior: |
      When nock.disableNetConnect() is called, any HTTP request that doesn't match a defined
      mock will throw NetConnectNotAllowedError with error code ENETUNREACH.

      Common causes:
      - URL path mismatch (mock: /users, request: /users/123)
      - HTTP method mismatch (mock: GET, request: POST)
      - Query parameter mismatch
      - Header mismatch (when using matchHeader)
      - Body mismatch (POST/PUT/PATCH)
      - Hostname mismatch

      This is the MOST COMMON nock error pattern (40-50% of nock failures).
    error_type: NetConnectNotAllowedError
    error_code: ENETUNREACH
    patterns:
      - "nock('{host}').get('{path}').reply({status})"
      - "nock('{host}').post('{path}').reply({status})"
      - "nock.disableNetConnect()"
    references:
      - https://github.com/nock/nock/issues/884
      - https://michaelheap.com/test-sdks-with-nock/
      - https://github.com/sindresorhus/got/issues/187

  # Priority 2: Scope Not Done (Unused Mocks)
  - id: nock-scope-not-done
    summary: "Mocks that are defined but never called remain 'not done'"
    severity: MEDIUM
    behavior: |
      When a mock is defined but the expected request is never made, scope.isDone()
      returns false. This indicates:
      - The code under test didn't make the expected request
      - The mock configuration is incorrect
      - The test logic has a bug

      Best practice: Check scope.isDone() in afterEach or after each test.
      Frequency: 20-30% of nock usage issues.
    error_type: assertion_failure
    patterns:
      - "const scope = nock('{host}').get('{path}').reply({status})"
      - "scope.isDone()"
      - "nock.pendingMocks()"
    references:
      - https://blog.neverendingqs.com/2017/03/13/ensure-all-nock-interceptors-are-used.html
      - https://michaelheap.com/nock-all-mocks-used/
      - https://snyk.io/advisor/npm-package/nock/functions/nock.isDone

  # Priority 3: Scope Leaks (Missing Cleanup)
  - id: nock-scope-leak
    summary: "Mocks persist between tests without proper cleanup causing test pollution"
    severity: MEDIUM
    behavior: |
      Without calling nock.cleanAll() in afterEach, mocks can persist between tests:
      - False positives (test passes using previous test's mocks)
      - False negatives (test fails due to unexpected mocks)
      - Flaky tests (order-dependent failures)

      Especially problematic with persist() which makes mocks reusable.
      Frequency: 30-40% of nock projects missing cleanup.
    error_type: test_pollution
    patterns:
      - "afterEach(() => { nock.cleanAll(); })"
      - "nock('{host}').persist().get('{path}').reply({status})"
    references:
      - https://github.com/nock/nock/issues/705
      - https://circleci.com/blog/api-mock-testing-nock/
      - https://www.jackfranklin.co.uk/blog/mocking-web-requests/

  # Priority 4: Missing disableNetConnect
  - id: nock-missing-disable-net-connect
    summary: "Without disableNetConnect, real HTTP requests can leak through to production APIs"
    severity: HIGH
    behavior: |
      If nock.disableNetConnect() is not called, requests that don't match mocks will
      make REAL HTTP requests instead of throwing errors. This can cause:
      - Tests calling production APIs
      - Flaky tests (network-dependent)
      - Accidental data modification in production

      Best practice: Always call nock.disableNetConnect() in beforeAll/beforeEach.
      Frequency: 55% of projects missing this safeguard.
    error_type: configuration_error
    patterns:
      - "beforeAll(() => { nock.disableNetConnect(); })"
      - "beforeEach(() => { nock.disableNetConnect(); })"
      - "nock.enableNetConnect()"
    references:
      - https://blog.logrocket.com/api-mock-testing-with-nock-node-js/
      - https://michaelheap.com/test-sdks-with-nock/

  # Priority 5: Invalid URL Patterns
  - id: nock-invalid-url-pattern
    summary: "Malformed URLs or regex patterns cause parsing errors"
    severity: LOW
    behavior: |
      Invalid URL formats or regex syntax errors in mock definitions cause runtime errors:
      - Invalid regex patterns
      - Malformed URLs
      - Incorrect protocol (http vs https)
    error_type: throw
    patterns:
      - "nock('{host}').get(/{regex}/).reply({status})"
    references:
      - https://github.com/nock/nock

  # Priority 6: Header Matching Errors
  - id: nock-header-mismatch
    summary: "Request headers must match mock expectations or NetConnectNotAllowedError is thrown"
    severity: LOW
    behavior: |
      Headers are matched case-insensitively, but values must match exactly
      (unless using regex). Mismatched headers cause NetConnectNotAllowedError.
    error_type: NetConnectNotAllowedError
    patterns:
      - "nock('{host}').matchHeader('{name}', '{value}').get('{path}').reply({status})"
    references:
      - https://github.com/nock/nock/issues/2253

  # Priority 7: Body Matching Errors
  - id: nock-body-mismatch
    summary: "POST/PUT/PATCH request bodies must match mock expectations"
    severity: LOW
    behavior: |
      Request bodies are compared for exact match (unless using function matcher).
      Mismatched bodies cause NetConnectNotAllowedError.
    error_type: NetConnectNotAllowedError
    patterns:
      - "nock('{host}').post('{path}', {body}).reply({status})"
      - "nock('{host}').post('{path}', body => {condition}).reply({status})"

  # Priority 8: Recording Errors
  - id: nock-recorder-no-restore
    summary: "Missing nock.restore() after recording leaves nock in interception mode"
    severity: LOW
    behavior: |
      After using nock.recorder.rec() and nock.recorder.play(), must call
      nock.restore() to stop intercepting requests. Forgetting this leaves
      nock in recording mode.
    error_type: state_error
    patterns:
      - "nock.recorder.rec({options})"
      - "nock.recorder.play()"
      - "nock.restore()"
    references:
      - https://www.bytesmatter.io/blog/why-did-nock-not-record-all-the-api-requests/
      - https://www.clouddefense.ai/code/javascript/example/nock

  # Priority 9: Jest-Specific Unmatched Requests
  - id: nock-jest-unmatched-success
    summary: "Jest tests pass even with unmatched requests, errors appear after test completes"
    severity: HIGH
    behavior: |
      When using nock with Jest, unmatched requests can cause tests to succeed
      while throwing promises with "No match for request" errors that appear
      AFTER the test completes. Use expect.assertions() or disableNetConnect()
      to force errors during test execution.
    error_type: test_framework_specific
    patterns:
      - "expect.assertions({count})"
      - "nock.disableNetConnect()"
    references:
      - https://francosirena.dev/tech-notes/nock-jest/

  # Priority 10: Parallel Test Interference
  - id: nock-parallel-test-interference
    summary: "Multiple tests using nock in parallel can interfere with each other"
    severity: MEDIUM
    behavior: |
      nock state is global, so tests running in parallel can share mocks
      and cause flaky failures. Solution: run tests sequentially or isolate
      nock scope per test file.
    error_type: test_pollution
    patterns:
      - "jest --runInBand"
    references:
      - https://github.com/nock/nock/issues/997

  # Priority 11: Memory Leaks
  - id: nock-memory-leak
    summary: "Calling nock.restore() without nock.cleanAll() causes memory leaks"
    severity: LOW
    behavior: |
      Must call nock.cleanAll() before nock.restore() in afterEach to prevent
      memory leaks. Leaking mocks consume memory over time.
    error_type: memory_leak
    patterns:
      - "afterEach(() => { nock.cleanAll(); nock.restore(); })"
    references:
      - https://github.com/nock/nock/issues/2077

  # Priority 12: persist() Without Cleanup
  - id: nock-persist-leak
    summary: "persist() makes mocks reusable indefinitely causing cross-test pollution"
    severity: MEDIUM
    behavior: |
      Calling persist() on a mock makes it reusable for all requests.
      Without cleanup via nock.cleanAll(), these mocks persist across tests
      causing false positives and flaky tests.
    error_type: test_pollution
    patterns:
      - "nock('{host}').persist().get('{path}').reply({status})"
      - "afterEach(() => { nock.cleanAll(); })"
    references:
      - https://github.com/nock/nock/issues/1042
      - https://github.com/nock/nock/issues/1495
