package: "@azure/storage-blob"
semver: ">=12.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-27"
status: draft

functions:
  - name: download
    import_path: "@azure/storage-blob.BlobClient"
    description: "Downloads a blob from Azure Blob Storage"

    postconditions:
      - id: success
        condition: "blob exists and download succeeds"
        returns: "BlobDownloadResponse with readableStreamBody and blob metadata"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-download"
        severity: info

      - id: blob-not-found
        condition: "blob does not exist"
        throws: "RestError with statusCode 404 and x-ms-error-code: BlobNotFound"
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 404 or
          error.response.headers.get('x-ms-error-code') === 'BlobNotFound' to handle missing blobs.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: blob-archived
        condition: "blob is in archived tier"
        throws: "RestError with statusCode 409 and errorCode: BlobArchived"
        required_handling: >
          Caller MUST catch RestError and handle archived blobs by either
          rehydrating the blob first or returning appropriate error to user.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: network-error
        condition: "network failure, connection timeout, or DNS resolution failure"
        throws: "Error with code ECONNREFUSED, ETIMEDOUT, or ENOTFOUND"
        required_handling: >
          Caller MUST catch errors and implement retry logic with exponential backoff
          for transient network failures.
        source: "https://github.com/Azure/azure-sdk-for-js/issues/4999"
        severity: error

  - name: getProperties
    import_path: "@azure/storage-blob.BlobClient"
    description: "Gets blob properties including metadata, content type, and last modified time"

    postconditions:
      - id: success
        condition: "blob exists"
        returns: "BlobGetPropertiesResponse with metadata, contentType, lastModified, etc."
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobclient#@azure-storage-blob-blobclient-getproperties"
        severity: info

      - id: blob-not-found
        condition: "blob does not exist"
        throws: "RestError with statusCode 404 and errorCode: BlobNotFound"
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 404 to handle missing blobs.
          Common pattern is to check existence before accessing properties.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: container-not-found
        condition: "container does not exist"
        throws: "RestError with statusCode 404 and errorCode: ContainerNotFound"
        required_handling: >
          Caller MUST catch RestError and distinguish between BlobNotFound and ContainerNotFound
          to provide appropriate error messages.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

  - name: upload
    import_path: "@azure/storage-blob.BlockBlobClient"
    description: "Uploads data to a block blob"

    postconditions:
      - id: success
        condition: "upload succeeds"
        returns: "BlockBlobUploadResponse with requestId, version, and ETag"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-upload"
        severity: info

      - id: blob-already-exists
        condition: "blob exists and If-None-Match: * is set"
        throws: "RestError with statusCode 409 and errorCode: BlobAlreadyExists"
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 409 to handle
          conflicts when blob already exists.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: container-not-found
        condition: "container does not exist"
        throws: "RestError with statusCode 404 and errorCode: ContainerNotFound"
        required_handling: >
          Caller MUST catch RestError and either create container first or return
          appropriate error. Common mistake is not checking container existence.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: invalid-blob-type
        condition: "blob exists as different type (e.g., page blob)"
        throws: "RestError with statusCode 409 and errorCode: InvalidBlobType"
        required_handling: >
          Caller MUST catch RestError and handle type conflicts appropriately.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: network-error
        condition: "network failure during upload"
        throws: "Error with code ECONNREFUSED, ETIMEDOUT, or ENOTFOUND"
        required_handling: >
          Caller MUST catch errors and implement retry logic for transient failures.
        source: "https://github.com/Azure/azure-sdk-for-js/issues/4999"
        severity: error

  - name: uploadFile
    import_path: "@azure/storage-blob.BlockBlobClient"
    description: "Uploads a local file to a block blob (Node.js only)"

    postconditions:
      - id: success
        condition: "file upload succeeds"
        returns: "BlobUploadCommonResponse with requestId, version, and ETag"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploadfile"
        severity: info

      - id: container-not-found
        condition: "container does not exist"
        throws: "RestError with statusCode 404 and errorCode: ContainerNotFound"
        required_handling: >
          Caller MUST catch RestError and create container before uploading.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: network-error
        condition: "network failure during multipart upload"
        throws: "Error with network error code"
        required_handling: >
          Caller MUST catch errors and retry failed uploads with exponential backoff.
        source: "https://github.com/Azure/azure-sdk-for-js/issues/4999"
        severity: error

  - name: uploadData
    import_path: "@azure/storage-blob.BlockBlobClient"
    description: "Uploads a Buffer or Blob to a block blob"

    postconditions:
      - id: success
        condition: "data upload succeeds"
        returns: "BlobUploadCommonResponse with requestId, version, and ETag"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blockblobclient#@azure-storage-blob-blockblobclient-uploaddata"
        severity: info

      - id: container-not-found
        condition: "container does not exist"
        throws: "RestError with statusCode 404 and errorCode: ContainerNotFound"
        required_handling: >
          Caller MUST catch RestError and handle missing container appropriately.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: network-error
        condition: "network failure"
        throws: "Error with network error code"
        required_handling: >
          Caller MUST catch errors and implement retry logic.
        source: "https://github.com/Azure/azure-sdk-for-js/issues/4999"
        severity: error

  - name: create
    import_path: "@azure/storage-blob.ContainerClient"
    description: "Creates a new container in the storage account"

    postconditions:
      - id: success
        condition: "container creation succeeds"
        returns: "ContainerCreateResponse with requestId and ETag"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-create"
        severity: info

      - id: container-already-exists
        condition: "container with same name already exists"
        throws: "RestError with statusCode 409 and errorCode: ContainerAlreadyExists"
        required_handling: >
          Caller MUST catch RestError and check error.statusCode === 409 to handle
          existing containers. Common pattern is to check exists() first or catch and continue.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: container-being-deleted
        condition: "container is currently being deleted"
        throws: "RestError with statusCode 409 and errorCode: ContainerBeingDeleted"
        required_handling: >
          Caller MUST catch RestError and wait for deletion to complete before retrying.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: auth-error
        condition: "authentication fails or insufficient permissions"
        throws: "RestError with statusCode 403"
        required_handling: >
          Caller MUST catch RestError with statusCode 403 and handle authentication/authorization failures.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

  - name: delete
    import_path: "@azure/storage-blob.ContainerClient"
    description: "Deletes the container"

    postconditions:
      - id: success
        condition: "container deletion succeeds"
        returns: "ContainerDeleteResponse with requestId"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-delete"
        severity: info

      - id: container-not-found
        condition: "container does not exist"
        throws: "RestError with statusCode 404 and errorCode: ContainerNotFound"
        required_handling: >
          Caller MUST catch RestError and handle missing containers. Common pattern is
          to check exists() first or catch 404 and treat as success.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

      - id: lease-id-missing
        condition: "container has active lease but lease ID not provided"
        throws: "RestError with statusCode 412 and errorCode: LeaseIdMissing"
        required_handling: >
          Caller MUST catch RestError with statusCode 412 and handle lease conflicts.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

  - name: exists
    import_path: "@azure/storage-blob.ContainerClient"
    description: "Checks whether the container exists"

    postconditions:
      - id: success
        condition: "check completes successfully"
        returns: "boolean indicating whether container exists"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/containerclient#@azure-storage-blob-containerclient-exists"
        severity: info

      - id: auth-error
        condition: "authentication fails"
        throws: "RestError with statusCode 403"
        required_handling: >
          Caller SHOULD catch RestError for permission errors even when checking existence.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: warning

  - name: listContainers
    import_path: "@azure/storage-blob.BlobServiceClient"
    description: "Lists containers in the storage account"

    postconditions:
      - id: success
        condition: "listing succeeds"
        returns: "AsyncIterableIterator of ContainerItem objects"
        source: "https://learn.microsoft.com/en-us/javascript/api/@azure/storage-blob/blobserviceclient#@azure-storage-blob-blobserviceclient-listcontainers"
        severity: info

      - id: auth-error
        condition: "authentication fails"
        throws: "RestError with statusCode 403"
        required_handling: >
          Caller MUST catch RestError when iterating containers to handle auth failures.
        source: "https://learn.microsoft.com/en-us/rest/api/storageservices/blob-service-error-codes"
        severity: error

metadata:
  error_types:
    - RestError
  error_codes:
    - BlobNotFound
    - BlobAlreadyExists
    - BlobArchived
    - BlobBeingRehydrated
    - ContainerNotFound
    - ContainerAlreadyExists
    - ContainerBeingDeleted
    - InvalidBlobType
    - LeaseIdMissing
  http_status_codes:
    - 404  # Not Found
    - 409  # Conflict
    - 403  # Forbidden
    - 412  # Precondition Failed
  detection_estimate: 85%
  production_ready: false
  draft_reason: "Phase 6 (Analyzer Testing) and Phase 7 (Real-World Validation) not completed due to build issues. Contract is comprehensive but requires validation before production."
  notes: >
    All async operations throw RestError on failure. Error codes must be manually
    extracted from response headers via err.response.headers.get('x-ms-error-code')
    or err.details?.errorCode. See GitHub issue #4999 for error handling limitations.
