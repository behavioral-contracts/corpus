package: next-auth
semver: "^4.22.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-03-09"
status: draft

detection:
  await_patterns:
    - "encode({"
    - "decode({"

functions:
  - name: encode
    import_path: "next-auth/jwt"
    description: >
      Encrypts a JWT payload using AES-256-GCM (via jose library). Requires NEXTAUTH_SECRET.
      Used for custom JWT encoding in NextAuth options or standalone token generation.

    postconditions:
      - id: encode-no-try-catch
        condition: "secret parameter is undefined, null, or empty string; or EncryptJWT fails"
        throws: "TypeError from @panva/hkdf when secret is missing; Error from jose during encryption failure"
        required_handling: >
          Caller MUST wrap encode() in try/catch when called outside of NextAuth's own
          jwt.encode callback. Common error: NEXTAUTH_SECRET not set → TypeError from hkdf.
          Handle gracefully: log the configuration error and fail the request with 500.
          Note: encode() inside NextAuth's jwt.encode option is protected by the framework.
        source: "https://next-auth.js.org/configuration/options#secret"
        severity: warning

  - name: decode
    import_path: "next-auth/jwt"
    description: >
      Decrypts a NextAuth JWT token (AES-256-GCM encrypted). Throws on malformed tokens
      or wrong secret. Note: getToken() wraps decode() and catches errors internally —
      this postcondition applies to direct decode() calls only.

    postconditions:
      - id: decode-no-try-catch
        condition: "Token encrypted with different secret (key rotation), malformed token, or missing secret"
        throws: "JWEDecryptionFailed (wrong secret), JWEInvalid/JWTInvalid (malformed), TypeError (missing secret)"
        required_handling: >
          Caller MUST wrap decode() in try/catch when calling directly. Common scenarios:
          1. Secret rotation: old tokens throw JWEDecryptionFailed → return null/401, force re-auth
          2. Malformed/tampered token: JWEInvalid → return 401, do not expose error details
          3. Missing NEXTAUTH_SECRET: TypeError → configuration error, fail fast with clear message
          Note: getToken() from next-auth/jwt already wraps decode() in try/catch internally.
          This postcondition applies only to direct decode() calls.
        source: "https://next-auth.js.org/configuration/options#secret"
        severity: warning

notes:
  - "getToken() from next-auth/jwt already catches decode errors and returns null — no try/catch needed"
  - "encode()/decode() inside NextAuth jwt callbacks are protected by the framework"
  - "Rotate NEXTAUTH_SECRET carefully — existing sessions will be invalidated"
  - "CVE-2023-48309: Keep next-auth >= 4.24.5 for OAuth security fix"
  - "signIn() with redirect:false returns {ok, error} object — check .error, not try/catch"
