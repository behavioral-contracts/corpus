package: mongodb
semver: ">=5.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"
status: production
evidence_quality: stub

# CRITICAL SECURITY NOTES:
#
# CVE-2021-32050 (CVSS 5.5): Authentication Data Exposure
# - Affected versions: <3.6.10 || >=4.0.0 <4.0.5
# - Fixed in: 3.6.10, 4.0.5
# - Impact: Authentication data may be exposed to command listeners
#
# MINIMUM SAFE VERSION: >=3.6.10 (CVE fix)
# RECOMMENDED VERSION: >=5.0.0 (Node.js 14.20.1+ baseline, stable error hierarchy)
# PRODUCTION RECOMMENDATION: >=6.0.0 (Node.js 16.20.1+ LTS support)
#
# Common Production Bugs (Based on Real-World Analysis):
# 1. Connection leaks (40%) - MongoClient not closed before process exit
# 2. Missing error handling (35%) - No try-catch around async operations
# 3. Authentication failures (15%) - Wrong credentials or missing authSource
# 4. Pool misconfiguration (7%) - Multiple clients or improper pool settings
# 5. Improper lifecycle (3%) - Operating on closed client or closing too early
#
# Note: CVE-2025-14847 (MongoBleed, CVSS 8.7) affects MongoDB Server, not the npm driver.
# Ensure your MongoDB server is patched to versions: 8.2.3+, 8.0.17+, 7.0.28+, 6.0.27+, 5.0.32+, or 4.4.30+

# Detection rules for analyzer integration
detection:
  # MongoDB client and collection classes
  class_names: ["MongoClient", "Db", "Collection"]
  
  # Type declarations for MongoDB instances
  type_names: ["MongoClient", "Db", "Collection", "MongoClientOptions"]
  
  # No factory methods for MongoDB (uses constructors and methods)
  factory_methods: []
  
  # CRITICAL: Require instance tracking to avoid false positives
  # MongoDB method names (.find, .insertOne, .updateOne) could match other code
  # Instance tracking ensures we only flag tracked MongoDB instances
  require_instance_tracking: true
  
  # Patterns to identify MongoDB operations in await expressions
  await_patterns:
    # Connection
    - ".connect("
    
    # Read operations
    - ".find("
    - ".findone("
    - ".aggregate("
    - ".countdocuments("
    
    # Write operations
    - ".insertone("
    - ".insertmany("
    - ".updateone("
    - ".updatemany("
    - ".deleteone("
    - ".deletemany("
    - ".bulkwrite("
    
    # Admin operations
    - ".createindex("
    - ".drop("
    - ".collection("

functions:
  - name: connect
    import_path: "mongodb"
    description: "Establishes connection to MongoDB server or cluster"
    postconditions:
      - id: connection-failure
        condition: "Network error, authentication failure, or server selection timeout"
        throws: "MongoNetworkError, MongoServerSelectionError, MongoNetworkTimeoutError, or MongoError"
        required_handling: >
          Caller MUST catch connection errors and handle them separately from query errors.
          Implement retry logic with exponential backoff for transient connection issues.
          Log connection errors for operations monitoring.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/connection-troubleshooting/"
        severity: error

  - name: find
    import_path: "mongodb"
    description: "Queries collection for documents matching filter criteria"
    postconditions:
      - id: query-failure
        condition: "Network error, timeout, or invalid query syntax"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch query errors.
          Network errors (MongoNetworkError) may be transient and can be retried.
          Invalid query errors (MongoServerError) should not be retried.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: findOne
    import_path: "mongodb"
    description: "Queries collection for a single document matching filter criteria"
    postconditions:
      - id: query-failure
        condition: "Network error, timeout, or invalid query"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch query errors.
          Returns null if no document matches (not an error).
          Network errors may be transient and retriable.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: insertOne
    import_path: "mongodb"
    description: "Inserts a single document into collection"
    postconditions:
      - id: duplicate-key
        condition: "Document violates unique index constraint"
        throws: "MongoServerError with error.code === 11000"
        required_handling: >
          Caller MUST catch duplicate key errors (code 11000) and handle gracefully.
          Extract conflicting field from error message.
          DO NOT retry without changing the unique field value.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: insertMany
    import_path: "mongodb"
    description: "Inserts multiple documents into collection in bulk"
    postconditions:
      - id: bulk-write-failure
        condition: "One or more documents failed to insert"
        throws: "MongoBulkWriteError with details of failed operations"
        required_handling: >
          Caller MUST catch bulk write errors.
          Check error.result to see which documents succeeded and which failed.
          Handle partial success scenarios appropriately.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: updateOne
    import_path: "mongodb"
    description: "Updates a single document matching filter"
    postconditions:
      - id: update-failure
        condition: "Network error, invalid update operation, or write concern failure"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch update errors.
          Network errors may be transient.
          Invalid update operators (MongoServerError) should not be retried.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: updateMany
    import_path: "mongodb"
    description: "Updates multiple documents matching filter"
    postconditions:
      - id: bulk-update-failure
        condition: "Update operation failed or write concern not satisfied"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch bulk update errors.
          Check result.modifiedCount to verify how many documents were updated.
          Implement retry logic for transient failures.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: deleteOne
    import_path: "mongodb"
    description: "Deletes a single document matching filter"
    postconditions:
      - id: delete-failure
        condition: "Network error or write concern failure"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch delete errors.
          Deleting non-existent document is NOT an error (deletedCount = 0).
          Network errors may be transient and retriable.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: deleteMany
    import_path: "mongodb"
    description: "Deletes multiple documents matching filter"
    postconditions:
      - id: bulk-delete-failure
        condition: "Delete operation failed or write concern not satisfied"
        throws: "MongoServerError, MongoWriteConcernError, or MongoError"
        required_handling: >
          Caller MUST catch bulk delete errors.
          Check result.deletedCount to verify how many documents were deleted.
          Implement retry logic for transient failures.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: aggregate
    import_path: "mongodb"
    description: "Executes aggregation pipeline on collection"
    postconditions:
      - id: aggregation-failure
        condition: "Invalid pipeline stage, network error, or timeout"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch aggregation errors.
          Pipeline syntax errors (MongoServerError) should not be retried.
          Network errors may be transient and retriable.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: countDocuments
    import_path: "mongodb"
    description: "Counts documents in collection matching filter"
    postconditions:
      - id: count-failure
        condition: "Network error, timeout, or invalid filter"
        throws: "MongoServerError, MongoNetworkError, or MongoError"
        required_handling: >
          Caller MUST catch count errors.
          Network errors may be transient.
          Invalid filters should not be retried.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: createIndex
    import_path: "mongodb"
    description: "Creates index on collection"
    postconditions:
      - id: index-creation-failure
        condition: "Invalid index options, duplicate index name, or insufficient permissions"
        throws: "MongoServerError or MongoError"
        required_handling: >
          Caller MUST catch index creation errors.
          Index with same name but different options will fail.
          Check if index already exists before creating.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: drop
    import_path: "mongodb"
    description: "Drops collection from database"
    postconditions:
      - id: drop-failure
        condition: "Collection does not exist, insufficient permissions, or network error"
        throws: "MongoServerError or MongoError"
        required_handling: >
          Caller MUST catch drop errors.
          Dropping non-existent collection throws error.
          Use dropCollection with ifExists option to avoid errors.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: collection
    import_path: "mongodb"
    description: "Returns reference to collection in database"
    postconditions:
      - id: collection-access-failure
        condition: "Invalid collection name or database not connected"
        throws: "MongoError"
        required_handling: >
          Caller MUST catch collection access errors.
          Ensure database connection is established before accessing collections.
          Validate collection names before use.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

  - name: bulkWrite
    import_path: "mongodb"
    description: "Executes multiple write operations in bulk"
    postconditions:
      - id: bulk-write-failure
        condition: "One or more operations failed"
        throws: "MongoBulkWriteError with details of failed operations"
        required_handling: >
          Caller MUST catch bulk write errors.
          Check error.result for success/failure details of each operation.
          Handle partial success appropriately.
        sources:
          - "https://www.mongodb.com/docs/drivers/node/current/"
        severity: error

# Common edge cases and production bugs
edge_cases:
  - id: connection-not-closed
    description: >
      VERY COMMON (40% of production bugs): MongoClient instance not closed before process exit.
      Results in resource leaks, connection pool exhaustion, and hanging connections.

      BAD: Creating client and not closing it
      ```typescript
      const client = new MongoClient(uri);
      await client.connect();
      // ... do work ...
      // ❌ Missing: await client.close();
      ```

      GOOD: Always close in finally block
      ```typescript
      const client = new MongoClient(uri);
      try {
        await client.connect();
        // ... do work ...
      } finally {
        await client.close(); // ✅ Always execute
      }
      ```

      For long-running applications, reuse a single MongoClient instance with connection pooling.
    sources:
      - "https://github.com/n8n-io/n8n/issues/1595"
    severity: warning

  - id: duplicate-key-not-handled
    description: >
      COMMON: Duplicate key errors (code 11000) not handled separately from other errors.

      Duplicate key errors should be caught and handled gracefully, NOT retried.

      ```typescript
      try {
        await collection.insertOne({ email: 'user@example.com' });
      } catch (error) {
        if (error instanceof MongoServerError && error.code === 11000) {
          // ✅ Handle duplicate key gracefully
          throw new Error('Email already exists');
        }
        // Other errors
        throw error;
      }
      ```

      DO NOT retry duplicate key errors without changing the conflicting value.
    sources:
      - "https://www.mongodb.com/docs/drivers/node/current/"
    severity: warning

  - id: transient-errors-not-retried
    description: >
      COMMON: Network and transient errors not detected or retried.

      Certain errors are transient and should be retried with exponential backoff:
      - MongoNetworkTimeoutError
      - MongoServerSelectionError
      - MongoNetworkError
      - Errors with label 'TransientTransactionError'

      ```typescript
      function isTransientError(error) {
        const transientNames = [
          'MongoNetworkTimeoutError',
          'MongoServerSelectionError',
          'MongoNetworkError',
        ];
        return transientNames.includes(error.name) ||
               error.hasErrorLabel?.('TransientTransactionError');
      }

      // Implement retry logic for transient errors
      ```

      parse-server implements this pattern: https://github.com/parse-community/parse-server
    sources:
      - "https://www.mongodb.com/docs/drivers/node/current/"
    severity: info

  - id: generic-catch-blocks
    description: >
      QUESTIONABLE: Using generic catch blocks without checking error codes.

      Different MongoDB errors require different recovery strategies:
      - Code 13 (Unauthorized): Reconnect with valid credentials
      - Code 11000 (Duplicate Key): Handle gracefully, don't retry
      - Code 17007 (Index Not Found): Create index and retry
      - Code 50 (MaxTimeMSExpired): Optimize query or increase timeout
      - Code 112 (WriteConflict): Retry transaction

      ```typescript
      try {
        await collection.insertOne(doc);
      } catch (error) {
        if (error instanceof MongoServerError) {
          // ✅ Check error.code to determine recovery strategy
          switch (error.code) {
            case 11000: /* duplicate key */
            case 13: /* unauthorized */
            // ... etc
          }
        }
      }
      ```
    sources:
      - "https://github.com/parse-community/parse-server"
    severity: info

  - id: connection-pool-misconfiguration
    description: >
      Creating multiple MongoClient instances or not configuring connection pool.

      BAD: Creating new client for each request
      ```typescript
      app.get('/api/users', async (req, res) => {
        const client = new MongoClient(uri); // ❌ New client every request
        await client.connect();
        // ...
        await client.close();
      });
      ```

      GOOD: Reuse single client instance with pooling
      ```typescript
      const client = new MongoClient(uri, {
        maxPoolSize: 10,
        minPoolSize: 2,
        serverSelectionTimeoutMS: 5000,
      });
      await client.connect();

      app.get('/api/users', async (req, res) => {
        // ✅ Reuse the same client
        const result = await client.db().collection('users').find().toArray();
        res.json(result);
      });
      ```

      Close client only on application shutdown.
    sources:
      - "https://www.mongodb.com/docs/drivers/node/current/"
    severity: info
