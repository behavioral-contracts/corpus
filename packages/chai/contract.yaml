package: chai
semver: ">=4.0.0 <6.0.0"
contract_version: "1.0.0"
maintainer: "corpus-team"
last_verified: "2026-02-26"

functions:
  - name: expect
    import_path: "chai"
    description: "BDD-style assertion with chainable interface"
    postconditions:
      - id: expect-assertion-failure
        condition: "assertion fails (e.g., expect(value).to.equal(expected) when value !== expected)"
        throws: "AssertionError"
        required_handling: >
          Assertions are EXPECTED to throw in test code, but if used outside tests (e.g., in
          production validation), callers MUST wrap in try-catch.
          Without error handling, failed assertions crash the application.
          Use pattern: try { expect(value).to.equal(expected); } catch (error) { /* handle */ }
        source: "https://www.chaijs.com/api/bdd/"
        severity: warning

  - name: assert
    import_path: "chai"
    description: "Classic assert-style assertions"
    postconditions:
      - id: assert-assertion-failure
        condition: "assertion fails (e.g., assert.equal(actual, expected) when actual !== expected)"
        throws: "AssertionError"
        required_handling: >
          Assert-style assertions throw AssertionError on failure. In test code, this is expected.
          If used in production code, MUST wrap in try-catch to prevent crashes.
        source: "https://www.chaijs.com/api/assert/"
        severity: warning

  - name: should
    import_path: "chai"
    description: "Should-style chainable assertions"
    postconditions:
      - id: should-assertion-failure
        condition: "assertion fails (e.g., value.should.equal(expected) when value !== expected)"
        throws: "AssertionError"
        required_handling: >
          Should-style assertions throw AssertionError on failure. Primarily for test code.
          If used outside tests, MUST wrap in try-catch.
        source: "https://www.chaijs.com/api/bdd/"
        severity: warning

# Category: testing
# npm: https://www.npmjs.com/package/chai
# Repository: https://github.com/chaijs/chai
