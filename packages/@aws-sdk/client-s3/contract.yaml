package:
  name: "@aws-sdk/client-s3"
  semver: "^3.0.0"

behaviors:
  - id: s3-object-operations-error-handling
    description: "S3 object operations (GetObject, PutObject, DeleteObject, HeadObject, CopyObject) must be wrapped in try-catch"
    severity: ERROR
    patterns:
      - type: call_expression
        object: S3Client
        methods:
          - send
        args_contain:
          - GetObjectCommand
          - PutObjectCommand
          - DeleteObjectCommand
          - HeadObjectCommand
          - CopyObjectCommand
    mitigation: "Wrap S3 object operations in try-catch to handle NoSuchKey, AccessDenied, and network errors"

  - id: s3-multipart-upload-error-handling
    description: "S3 multipart upload operations must be wrapped in try-catch"
    severity: ERROR
    patterns:
      - type: call_expression
        object: S3Client
        methods:
          - send
        args_contain:
          - CreateMultipartUploadCommand
          - UploadPartCommand
          - CompleteMultipartUploadCommand
          - AbortMultipartUploadCommand
    mitigation: "Wrap multipart upload operations in try-catch to handle upload failures and ensure proper cleanup"

  - id: s3-bucket-operations-error-handling
    description: "S3 bucket operations (CreateBucket, DeleteBucket, HeadBucket) must be wrapped in try-catch"
    severity: ERROR
    patterns:
      - type: call_expression
        object: S3Client
        methods:
          - send
        args_contain:
          - CreateBucketCommand
          - DeleteBucketCommand
          - HeadBucketCommand
          - PutBucketPolicyCommand
    mitigation: "Wrap bucket operations in try-catch to handle BucketAlreadyExists, NoSuchBucket, and permission errors"

  - id: s3-list-operations-error-handling
    description: "S3 list operations should be wrapped in try-catch"
    severity: WARNING
    patterns:
      - type: call_expression
        object: S3Client
        methods:
          - send
        args_contain:
          - ListObjectsV2Command
          - ListBucketsCommand
    mitigation: "Wrap list operations in try-catch to handle pagination and access errors"
