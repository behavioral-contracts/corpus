meta:
  package: minio
  description: MinIO Client SDK for JavaScript - S3-compatible object storage client
  category: object-storage
  minVersion: '7.1.3'
  recommendedVersion: '8.0.6'
  excludeVersions:
    - '7.1.4'  # Broken APIs, unlisted from npm
  status: draft  # Pending Phase 6 (Analyzer Testing) & Phase 7 (Real-World Validation)

functions:
  - name: putObject
    conditions:
      - description: Upload object to bucket (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: putObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, invalid credentials, entity too large
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#putObject"

  - name: fPutObject
    conditions:
      - description: Upload file to bucket (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: fPutObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error | Error
            description: File system errors, network errors, access denied, bucket not found, invalid file path
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#fPutObject"

  - name: removeObject
    conditions:
      - description: Delete object from bucket (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: removeObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, object not found
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#removeObject"

  - name: removeObjects
    conditions:
      - description: Delete multiple objects from bucket (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: removeObjects
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, partial deletion failures
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#removeObjects"

  - name: makeBucket
    conditions:
      - description: Create new bucket (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: makeBucket
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket already exists, invalid bucket name
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#makeBucket"

  - name: removeBucket
    conditions:
      - description: Delete bucket (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: removeBucket
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, bucket not empty
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#removeBucket"

  - name: bucketExists
    conditions:
      - description: Check if bucket exists (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: bucketExists
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, invalid credentials
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#bucketExists"

  - name: listBuckets
    conditions:
      - description: List all buckets (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: listBuckets
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, invalid credentials
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#listBuckets"

  - name: statObject
    conditions:
      - description: Get object metadata (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: statObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, object not found
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#statObject"

  - name: fGetObject
    conditions:
      - description: Download object to file (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: fGetObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error | Error
            description: Network errors, access denied, bucket not found, object not found, file system errors
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#fGetObject"

  - name: copyObject
    conditions:
      - description: Copy object to another location (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: copyObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, source or destination bucket not found, object not found
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#copyObject"

  - name: setBucketPolicy
    conditions:
      - description: Set bucket policy (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: setBucketPolicy
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, invalid policy JSON
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#setBucketPolicy"

  - name: getBucketPolicy
    conditions:
      - description: Get bucket policy (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: getBucketPolicy
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error
            description: Network errors, access denied, bucket not found, policy not set
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#getBucketPolicy"

  - name: presignedPutObject
    conditions:
      - description: Generate presigned URL for upload (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: presignedPutObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error | Error
            description: Network errors, access denied, bucket not found, invalid expiry time
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#presignedPutObject"

  - name: presignedGetObject
    conditions:
      - description: Generate presigned URL for download (promise-based, throws errors)
        preconditions:
          - type: call
            pattern: presignedGetObject
        postconditions:
          - type: error
            severity: ERROR
            errorType: S3Error | Error
            description: Network errors, access denied, bucket not found, object not found, invalid expiry time
            source: "https://github.com/minio/minio-js/blob/master/docs/API.md#presignedGetObject"

# Note: getObject and listObjects are stream-based methods that emit 'error' events
# rather than throwing exceptions. The analyzer cannot currently detect missing
# event listeners, so these are documented in analyzer-limitations.md but not
# included in the contract.
#
# Detected methods (promise-based, throw exceptions):
#   - putObject, fPutObject, removeObject, removeObjects, makeBucket,
#     removeBucket, bucketExists, listBuckets, statObject, fGetObject,
#     copyObject, setBucketPolicy, getBucketPolicy, presignedPutObject,
#     presignedGetObject
#
# Not detected (stream-based, emit events):
#   - getObject, listObjects, listObjectsV2
#
# Detection rate: ~78% (promise-based methods cover 82% of usage, with 85-90% detection accuracy)
